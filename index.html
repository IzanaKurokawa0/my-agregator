<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>А | ГосНавигатор — Интеллектуальное окно активности</title>
    
    <!-- FAVICON: Красная А на белом фоне -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22white%22/><text y=%22.85em%22 x=%2210%22 font-size=%2285%22 font-family=%22Arial, sans-serif%22 font-weight=%22900%22 fill=%22%23e63946%22>А</text></svg>">

    <style>
        :root {
            --bg: #ffffff;
            --card-bg: #f8fafc;
            --text: #0f172a;
            --muted: #64748b;
            --accent: #e63946;
            --border: #e2e8f0;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* ЭКСТРЕМАЛЬНО ЧИТАЕМАЯ ТЕМНАЯ ТЕМА */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #020617;
                --card-bg: #0f172a;
                --text: #ffffff; /* Белоснежный текст */
                --muted: #cbd5e1;
                --border: #1e293b;
                --shadow: 0 20px 50px rgba(0,0,0,0.4);
            }
            .card-h3 { color: #ffffff !important; text-shadow: 0 0 10px rgba(255,255,255,0.1); }
        }

        * { margin:0; padding:0; box-sizing:border-box; transition: 0.3s ease; scroll-behavior: smooth; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* HEADER */
        header { 
            background: var(--bg); padding: 15px 24px; position: sticky; top: 0; z-index: 1000; 
            border-bottom: 2px solid var(--accent); backdrop-filter: blur(10px);
        }
        .nav-inner { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; cursor: pointer; }
        .logo-box { 
            background: #fff; border: 3px solid var(--accent); color: var(--accent); 
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; 
            border-radius: 12px; font-weight: 900; font-size: 26px; 
        }

        /* ЭКРАН 1: ВЫБОР РЕГИОНА */
        #home-screen { padding: 100px 20px; text-align: center; max-width: 800px; margin: 0 auto; min-height: 80vh; display: flex; flex-direction: column; justify-content: center; }
        .hero-h1 { font-size: clamp(2.5rem, 8vw, 4rem); font-weight: 900; letter-spacing: -3px; margin-bottom: 30px; line-height: 1; }
        
        .main-input { 
            width: 100%; max-width: 600px; padding: 25px 35px; border-radius: 50px; border: 3px solid var(--border);
            font-size: 1.3rem; outline: none; background: var(--card-bg); color: var(--text); font-weight: 700; margin: 0 auto;
        }
        .main-input:focus { border-color: var(--accent); transform: translateY(-3px); }

        /* ЭКРАН 2: РЕГИОНАЛЬНЫЙ ДАШБОРД */
        #region-screen { display: none; padding: 20px 24px 80px; max-width: 1500px; margin: 0 auto; }
        
        /* СПИСОК КАТЕГОРИЙ (МЕНЮ) */
        .sticky-menu { 
            position: sticky; top: 80px; z-index: 900; background: var(--bg); 
            padding: 15px 0; border-bottom: 2px solid var(--border); margin-bottom: 40px;
        }
        .chips-list { 
            display: flex; gap: 12px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; 
        }
        .chips-list::-webkit-scrollbar { display: none; }
        .chip-btn { 
            flex: 0 0 auto; padding: 10px 22px; border-radius: 20px; 
            background: var(--card-bg); border: 1.5px solid var(--border);
            text-decoration: none; color: var(--text); font-weight: 850; font-size: 0.9rem; cursor: pointer;
        }
        .chip-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }

        /* КАРТОЧКИ УСЛУГ */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 35px; }
        .card { 
            background: var(--card-bg); border-radius: 40px; padding: 35px; 
            border: 2px solid var(--border); box-shadow: var(--shadow);
            scroll-margin-top: 160px; /* Чтобы блок не заезжал под меню при скролле */
        }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card-h3 { font-size: 1.7rem; font-weight: 950; margin-bottom: 25px; display: flex; align-items: center; gap: 12px; }
        
        .service-link { 
            display: flex; justify-content: space-between; align-items: center; 
            text-decoration: none; color: var(--text); padding: 16px 0; 
            border-bottom: 2px solid var(--border); font-weight: 800; font-size: 1.15rem;
        }
        .service-link:hover { color: var(--accent); padding-left: 10px; border-bottom-color: var(--accent); }

        /* ЦИФРОВОЙ СЕЙФ */
        .vault { 
            background: var(--card-bg); padding: 30px; border-radius: 35px; 
            border: 3px dashed var(--accent); margin-bottom: 40px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;
        }
        .vault-title { grid-column: 1/-1; font-weight: 950; color: var(--accent); font-size: 0.85rem; text-transform: uppercase; margin-bottom: 10px; }
        .vault-input { padding: 18px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--bg); color: var(--text); font-weight: 800; outline: none; }

        footer { padding: 80px 24px; text-align: center; border-top: 2px solid var(--border); color: var(--muted); font-weight: 800; margin-top: 80px; }

        /* ПОДСКАЗКИ РЕГИОНОВ */
        .suggest-list { 
            position: absolute; top: 105px; left: 0; right: 0; background: var(--card-bg); 
            border-radius: 30px; box-shadow: var(--shadow); z-index: 100; display: none; padding: 15px; border: 2px solid var(--border);
        }
        .suggest-item { padding: 18px 25px; border-radius: 20px; cursor: pointer; display: flex; justify-content: space-between; font-weight: 800; }
        .suggest-item:hover { background: var(--accent); color: white; }

        @media (max-width: 768px) {
            .hero-h1 { font-size: 2.2rem; }
            .grid { grid-template-columns: 1fr; }
            .card { padding: 25px; border-radius: 30px; }
            .card-h3 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="nav-inner">
        <div class="logo" onclick="goHome()">
            <div class="logo-box">А</div>
            <div style="font-size: 1.6rem; font-weight: 900; letter-spacing: -1px;">ГосНавигатор</div>
        </div>
        <div id="active-reg-badge" style="font-weight: 900; color: #fff; background: var(--accent); padding: 8px 16px; border-radius: 12px; font-size: 0.8rem;">ВЫБЕРИТЕ РЕГИОН</div>
    </div>
</header>

<!-- ЭКРАН 1: ГЛАВНАЯ -->
<main id="home-screen">
    <h1 class="hero-h1">Ваш регион — <br>Ваше окно активности</h1>
    <div style="position: relative; width: 100%; max-width: 650px; margin: 0 auto;">
        <input type="text" id="regMainSearch" class="main-input" placeholder="Введите название региона (напр. Новосибирск)..." autocomplete="off">
        <div id="regSuggests" class="suggest-list"></div>
    </div>
    <div style="margin-top: 40px; display: flex; justify-content: center; gap: 20px; font-weight: 900;">
        <a href="#reg77" style="color: var(--accent); text-decoration: none;">МОСКВА</a>
        <a href="#reg54" style="color: var(--accent); text-decoration: none;">НОВОСИБИРСК</a>
        <a href="#reg78" style="color: var(--accent); text-decoration: none;">САНКТ-ПЕТЕРБУРГ</a>
    </div>
</main>

<!-- ЭКРАН 2: РЕГИОН -->
<main id="region-screen">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 20px;">
        <h2 id="regTitle" style="font-size: 3.5rem; font-weight: 950; letter-spacing: -3px;">Регион</h2>
        <button onclick="goHome()" style="padding: 15px 30px; border-radius: 20px; border: 2px solid var(--border); font-weight: 900; color: var(--text); background: var(--card-bg); cursor: pointer;">СМЕНИТЬ РЕГИОН</button>
    </div>

    <!-- СПИСОК КАТЕГОРИЙ (МЕНЮ ССЫЛОК) -->
    <div class="sticky-menu">
        <div id="chipsContainer" class="chips-list"></div>
    </div>

    <!-- СЕЙФ -->
    <div class="vault">
        <div class="vault-title">🔒 Цифровой сейф (данные только в вашем браузере)</div>
        <input type="text" id="v_jkh" class="vault-input" placeholder="Лицевой счет ЖКХ..." oninput="saveVault()">
        <input type="text" id="v_polis" class="vault-input" placeholder="Полис ОМС..." oninput="saveVault()">
        <input type="text" id="v_snils" class="vault-input" placeholder="СНИЛС..." oninput="saveVault()">
    </div>

    <!-- САМИ БЛОКИ -->
    <div id="megaGrid" class="grid"></div>
</main>

<footer>
    <p><b>gos-navigator-project.ru</b> — Новое окно интернет-активности</p>
    <p style="margin-top: 10px; opacity: 0.6; font-size: 0.9rem;">Проект Кирилла Чернякова (25132БУ) © 2024</p>
</footer>

<script>
// БАЗА РЕГИОНОВ ЧАСТЬ 1 (01-45)
const regionsDB = [
    ["01", "Адыгея"], ["02", "Башкортостан"], ["03", "Бурятия"], ["04", "Алтай"], ["05", "Дагестан"], ["06", "Ингушетия"],
    ["07", "Кабардино-Балкария"], ["08", "Калмыкия"], ["09", "Карачаево-Черкесия"], ["10", "Карелия"], ["11", "Коми"],
    ["12", "Марий Эл"], ["13", "Мордовия"], ["14", "Якутия"], ["15", "Северная Осетия"], ["16", "Татарстан"],
    ["17", "Тыва"], ["18", "Удмуртия"], ["19", "Хакасия"], ["21", "Чувашия"], ["22", "Алтайский край"],
    ["23", "Краснодарский край"], ["24", "Красноярский край"], ["25", "Приморский край"], ["26", "Ставропольский край"],
    ["27", "Хабаровский край"], ["28", "Амурская область"], ["29", "Архангельская область"], ["30", "Астраханская область"],
    ["31", "Белгородская область"], ["32", "Брянская область"], ["33", "Владимирская область"], ["34", "Волгоградская область"],
    ["35", "Вологодская область"], ["36", "Воронежская область"], ["37", "Ивановская область"], ["38", "Иркутская область"],
    ["39", "Калининградская область"], ["40", "Калужская область"], ["41", "Камчатский край"], ["42", "Кемеровская область"],
    ["43", "Кировская область"], ["44", "Костромская область"], ["45", "Курганская область"],
    ["46", "Курская область"], ["47", "Ленинградская область"], ["48", "Липецкая область"], ["49", "Магаданская область"],
    ["50", "Московская область"], ["51", "Мурманская область"], ["52", "Нижегородская область"], ["53", "Новгородская область"],
    ["54", "Новосибирская область"], ["55", "Омская область"], ["56", "Оренбургская область"], ["57", "Орловская область"],
    ["58", "Пензенская область"], ["59", "Пермский край"], ["60", "Псковская область"], ["61", "Ростовская область"],
    ["62", "Рязанская область"], ["63", "Самарская область"], ["64", "Саратовская область"], ["65", "Сахалинская область"],
    ["66", "Свердловская область"], ["67", "Смоленская область"], ["68", "Тамбовская область"], ["69", "Тверская область"],
    ["70", "Томская область"], ["71", "Тульская область"], ["72", "Тюменская область"], ["73", "Ульяновская область"],
    ["74", "Челябинская область"], ["75", "Забайкальский край"], ["76", "Ярославская область"], ["77", "г. Москва"],
    ["78", "г. Санкт-Петербург"], ["79", "Еврейская автономная обл."], ["82", "Республика Крым"], ["83", "Ненецкий автономный округ"],
    ["86", "Ханты-Мансийский АО — Югра"], ["87", "Чукотский автономный округ"], ["89", "Ямало-Ненецкий АО"], ["92", "г. Севастополь"]
];

// ГЕНЕРАТОР 16 СФЕР ЖИЗНИ
function buildMegaGrid(code, name) {
    const enc = encodeURIComponent(name);
    let list = [
        { id: "gov", title: "🏛️ Власть", links: [["Госуслуги РФ", "https://www.gosuslugi.ru"], ["Мои Документы", "https://mfc.rf"], ["Администрация", `https://yandex.ru/search/?text=администрация+${enc}`]] },
        { id: "taxi", title: "🚖 Такси и Еда", links: [["Яндекс Go (Такси)", "https://taxi.yandex.ru"], ["Яндекс Еда", "https://eda.yandex.ru"], ["Самокат (Доставка)", "https://samokat.ru"]] },
        { id: "shop", title: "🛍️ Покупки", links: [["Wildberries", "https://www.wildberries.ru"], ["Ozon", "https://www.ozon.ru"], ["Яндекс Маркет", "https://market.yandex.ru"]] },
        { id: "med", title: "🏥 Здоровье", links: [["Запись к врачу", "https://www.gosuslugi.ru/600447/1/form"], ["Эл. Регистратура", `https://yandex.ru/search/?text=запись+к+врачу+${enc}`], ["Аптеки", "https://aptekamos.ru"]] },
        { id: "tran", title: "🚆 Транспорт", links: [["РЖД Билеты", "https://www.rzd.ru"], ["Яндекс Карты", "https://yandex.ru/maps"], ["Автобусы", "https://www.tutu.ru/bus/"]] },
        { id: "hous", title: "💡 Жилье", links: [["ГИС ЖКХ", "https://dom.gosuslugi.ru"], ["Квартплата", "https://kvartplata.ru"], ["Энергосбыт", `https://yandex.ru/search/?text=энергосбыт+${enc}`]] },
        { id: "fin", title: "💰 Финансы", links: [["Личный кабинет ФНС", "https://lkfl2.nalog.ru"], ["Пенсии (СФР)", "https://sfr.gov.ru"], ["Сбербанк", "https://www.sberbank.ru"]] },
        { id: "work", title: "💼 Карьера", links: [["Работа в России", "https://trudvsem.ru"], ["Мой Бизнес", "https://мойбизнес.рф"], ["Вакансии", "https://hh.ru"]] },
        { id: "edu", title: "📚 Учеба", links: [["Эл. дневник", `https://yandex.ru/search/?text=дневник+${enc}`], ["Stepik", "https://stepik.org"], ["ВУЗы РФ", "https://postupi.online"]] },
        { id: "cult", title: "🎭 Досуг", links: [["Яндекс Афиша", `https://afisha.yandex.ru/search?text=${enc}`], ["Пушкинская карта", "https://www.culture.ru"], ["Кинопоиск", "https://www.kinopoisk.ru"]] },
        { id: "fam", title: "👶 Семья", links: [["Выплаты", "https://www.gosuslugi.ru/10639/1"], ["Запись в садик", "https://www.gosuslugi.ru/10902/1"], ["ЗАГС", "https://zags.nalog.ru"]] },
        { id: "sec", title: "🛡️ Защита", links: [["Проверка долгов", "https://fssp.gov.ru"], ["Проверка авто", "https://гибдд.рф/check/auto"], ["Полиция", "https://102.mvd.ru"]] },
        { id: "eco", title: "🌿 Экология", links: [["Пункты приема", "https://recyclemap.ru"], ["Качество воздуха", "https://yandex.ru/pogoda/maps/nowcast"]] },
        { id: "comm", title: "📱 Связь", links: [["Почта России", "https://www.pochta.ru"], ["Спидтест", "https://www.speedtest.net"], ["Вышки 4G", "https://rkn.gov.ru"]] },
        { id: "sport", title: "⚽ Спорт", links: [["ГТО", "https://www.gto.ru"], ["Запись в секции", "https://www.gosuslugi.ru/600363/1/form"]] },
        { id: "tour", title: "🌍 Туризм", links: [["Путешествия", "https://russia.travel"], ["Отели", "https://ostrovok.ru"]] }
    ];

    // ДЕТЕКТОР МЕТРО (Новосибирск, Москва, СПб, Казань, Самара, Н.Новгород, Екатеринбург)
    const metroCodes = ["54", "77", "78", "16", "63", "52", "66"];
    if (metroCodes.includes(code)) {
        list.splice(4, 0, { id: "metro", title: "🚇 Метрополитен", links: [["Схема метро", `https://yandex.ru/search/?text=схема+метро+${enc}`], ["Пополнение карты", `https://yandex.ru/search/?text=пополнить+транспортную+карту+${enc}`]] });
    }
    return list;
}

// ЛОГИКА УПРАВЛЕНИЯ
const regMainSearch = document.getElementById('regMainSearch');
const regSuggests = document.getElementById('regSuggests');
const homeScreen = document.getElementById('home-screen');
const regionScreen = document.getElementById('region-screen');

// 1. Поиск регионов (Главная)
regMainSearch.addEventListener('input', (e) => {
    const val = e.target.value.toLowerCase().trim();
    regSuggests.innerHTML = '';
    if (val.length < 1) { regSuggests.style.display = 'none'; return; }
    const filtered = regionsDB.filter(r => r[1].toLowerCase().includes(val) || r[0].includes(val));
    if (filtered.length > 0) {
        regSuggests.style.display = 'block';
        filtered.forEach(r => {
            const div = document.createElement('div');
            div.className = 'suggest-item';
            div.innerHTML = `<span>📍 ${r[1]}</span> <small>${r[0]}</small>`;
            div.onclick = () => { window.location.hash = 'reg' + r[0]; };
            regSuggests.appendChild(div);
        });
    }
});

// 2. Рендеринг региона
function renderRegion(code) {
    const reg = regionsDB.find(r => r[0] === code);
    if (!reg) return goHome();

    homeScreen.style.display = 'none';
    regionScreen.style.display = 'block';
    document.getElementById('regTitle').innerText = reg[1];
    document.getElementById('status-tag').innerText = reg[1].toUpperCase();

    const grid = document.getElementById('megaGrid');
    const chips = document.getElementById('chipsContainer');
    grid.innerHTML = '';
    chips.innerHTML = '';

    const data = buildMegaGrid(reg[0], reg[1]);
    data.forEach(cat => {
        // Создаем кнопку-чипс (Меню)
        const chip = document.createElement('div');
        chip.className = 'chip-btn';
        chip.innerText = cat.title;
        chip.onclick = () => {
            document.getElementById('block-' + cat.id).scrollIntoView({ behavior: 'smooth' });
        };
        chips.appendChild(chip);

        // Создаем карточку (Блок)
        const card = document.createElement('div');
        card.className = 'card';
        card.id = 'block-' + cat.id;
        card.innerHTML = `
            <h3 class="card-h3">${cat.title}</h3>
            <div style="flex-grow:1">
                ${cat.links.map(l => `<a href="${l[1]}" target="_blank" class="service-link">${l[0]} <span>➔</span></a>`).join('')}
            </div>
        `;
        grid.appendChild(card);
    });
    loadVault();
}

function goHome() {
    window.location.hash = '';
    homeScreen.style.display = 'flex';
    regionScreen.style.display = 'none';
    regMainSearch.value = '';
    regSuggests.style.display = 'none';
    document.getElementById('status-tag').innerText = 'ВЫБЕРИТЕ РЕГИОН';
}

function saveVault() {
    localStorage.setItem('v_jkh', document.getElementById('v_jkh').value);
    localStorage.setItem('v_polis', document.getElementById('v_polis').value);
    localStorage.setItem('v_snils', document.getElementById('v_snils').value);
}

function loadVault() {
    document.getElementById('v_jkh').value = localStorage.getItem('v_jkh') || '';
    document.getElementById('v_polis').value = localStorage.getItem('v_polis') || '';
    document.getElementById('v_snils').value = localStorage.getItem('v_snils') || '';
}

function router() {
    const h = window.location.hash;
    if (h.startsWith('#reg')) {
        renderRegion(h.replace('#reg', ''));
    } else {
        goHome();
    }
}

window.addEventListener('hashchange', router);
window.addEventListener('load', router);

document.addEventListener('click', (e) => {
    if (!e.target.closest('#regMainSearch')) regSuggests.style.display = 'none';
});
</script>
</body>
</html>
