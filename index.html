<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>А | ГосНавигатор 2026 — Ультимативный агрегатор</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22white%22/><text y=%22.85em%22 x=%2210%22 font-size=%2285%22 font-family=%22Arial, sans-serif%22 font-weight=%22900%22 fill=%22%23ef4444%22>А</text></svg>">

    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #1a1f26;
            --accent: #ef4444;
            --border: #e5e7eb;
            --shadow: 0 2px 8px rgba(0,0,0,0.05);
            --sub-bg: #f8fafc; /* Фон для вложенных агрегаторов */
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0a0c10;
                --card-bg: #161b22;
                --text: #ffffff; 
                --border: #30363d;
                --sub-bg: #1c2128;
                --shadow: 0 10px 30px rgba(0,0,0,0.5);
            }
            .sub-title { color: #8b949e !important; }
        }

        * { margin:0; padding:0; box-sizing:border-box; transition: 0.2s ease; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.4; overflow-x: hidden; font-size: 13px; }

        header { 
            background: var(--card-bg); padding: 10px 15px; border-bottom: 2px solid var(--accent);
            position: sticky; top: 0; z-index: 1000; box-shadow: var(--shadow);
        }
        .nav-inner { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo-box { background: #fff; border: 2px solid var(--accent); color: var(--accent); width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-weight: 900; font-size: 18px; }

        #home-screen { padding: 40px 15px; text-align: center; max-width: 600px; margin: 0 auto; min-height: 80vh; display: flex; flex-direction: column; justify-content: center; }
        .hero-h1 { font-size: 2rem; font-weight: 900; margin-bottom: 20px; letter-spacing: -1px; }
        .main-input { width: 100%; padding: 15px 20px; border-radius: 12px; border: 2px solid var(--border); font-size: 1rem; outline: none; background: var(--card-bg); color: var(--text); font-weight: 700; }

        #region-screen { display: none; padding: 10px 10px 60px; max-width: 1600px; margin: 0 auto; }

        /* МНОГОУРОВНЕВОЕ МЕНЮ (ЧИПСЫ) */
        .category-nav { 
            background: var(--bg); padding: 10px 0; position: sticky; top: 52px; z-index: 950; 
            display: flex; flex-wrap: wrap; gap: 6px; border-bottom: 1px solid var(--border);
        }
        .nav-chip { padding: 5px 10px; border-radius: 8px; background: var(--card-bg); border: 1px solid var(--border); font-weight: 800; font-size: 0.75rem; cursor: pointer; }
        .nav-chip:hover { border-color: var(--accent); color: var(--accent); }

        /* КАРТОЧКИ (Агрегатор в агрегаторе) */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; margin-top: 15px; }
        .card { 
            background: var(--card-bg); border-radius: 18px; padding: 15px; 
            border: 1px solid var(--border); box-shadow: var(--shadow); scroll-margin-top: 130px;
        }
        .card:hover { border-color: var(--accent); }
        .card-h3 { font-size: 1.1rem; font-weight: 900; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }

        /* ВЛОЖЕННЫЕ БЛОКИ (СУБ-АГРЕГАТОР) */
        .sub-group { background: var(--sub-bg); border-radius: 10px; padding: 8px; margin-bottom: 10px; }
        .sub-title { font-size: 0.7rem; font-weight: 900; color: #64748b; text-transform: uppercase; margin-bottom: 5px; display: block; letter-spacing: 0.5px; }
        
        .service-link { 
            display: flex; justify-content: space-between; align-items: center; 
            text-decoration: none; color: var(--text); padding: 6px 0; 
            border-bottom: 1px solid rgba(0,0,0,0.03); font-weight: 600; font-size: 0.9rem;
        }
        .service-link:hover { color: var(--accent); transform: translateX(3px); }
        .service-link span { font-size: 0.65rem; background: var(--accent); color: white; padding: 1px 5px; border-radius: 4px; opacity: 0.9; }

        footer { padding: 30px; text-align: center; font-size: 0.75rem; color: #64748b; border-top: 1px solid var(--border); margin-top: 30px; }

        /* ПОДСКАЗКИ */
        .suggest-list { position: absolute; top: 60px; left: 0; right: 0; background: var(--card-bg); border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); z-index: 100; display: none; padding: 5px; border: 1px solid var(--border); }
        .suggest-item { padding: 10px 15px; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; font-weight: 700; }
        .suggest-item:hover { background: var(--accent); color: white; }

        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } .category-nav { flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; } }
    </style>
</head>
<body>

<header>
    <div class="nav-inner">
        <div class="logo" onclick="goHome()" style="display:flex; align-items:center; gap:8px; cursor:pointer;">
            <div class="logo-box">А</div>
            <div style="font-weight: 900; letter-spacing: -0.5px;">ГосНавигатор</div>
        </div>
        <div id="reg-badge" style="background:var(--accent); color:#fff; padding:4px 10px; border-radius:6px; font-weight:900; font-size:0.7rem;">2026</div>
    </div>
</header>

<main id="home-screen">
    <h1 class="hero-h1">Все сервисы России <br>в одном окне.</h1>
    <div style="position: relative;">
        <input type="text" id="regInput" class="main-input" placeholder="Введите город или регион..." autocomplete="off">
        <div id="regSuggests" class="suggest-list"></div>
    </div>
</main>

<main id="region-screen">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <h2 id="regTitle" style="font-size: 1.5rem; font-weight: 900;">Регион</h2>
        <button onclick="goHome()" style="padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); font-weight: 800; cursor: pointer; background: var(--card-bg); color: var(--text);">СМЕНИТЬ</button>
    </div>
    <nav class="category-nav" id="catNav"></nav>
    <div id="megaGrid" class="grid"></div>
</main>

<footer>
    <p>© 2026 GOS-NAVIGATOR-PROJECT.RU — Кирилл Черняков, 25132БУ</p>
</footer>

<script>
const regionsDB = [
    ["01", "Адыгея"], ["02", "Башкортостан"], ["03", "Бурятия"], ["04", "Алтай"], ["05", "Дагестан"], ["06", "Ингушетия"],
    ["07", "Кабардино-Балкария"], ["08", "Калмыкия"], ["09", "Карачаево-Черкесия"], ["10", "Карелия"], ["11", "Коми"],
    ["12", "Марий Эл"], ["13", "Мордовия"], ["14", "Якутия"], ["15", "Северная Осетия"], ["16", "Татарстан"],
    ["17", "Тыва"], ["18", "Удмуртия"], ["19", "Хакасия"], ["21", "Чувашия"], ["22", "Алтайский край"],
    ["23", "Краснодарский край"], ["24", "Красноярский край"], ["25", "Приморский край"], ["26", "Ставропольский край"],
    ["27", "Хабаровский край"], ["28", "Амурская область"], ["29", "Архангельская область"], ["30", "Астраханская область"],
    ["31", "Белгородская область"], ["32", "Брянская область"], ["33", "Владимирская область"], ["34", "Волгоградская область"],
    ["35", "Вологодская область"], ["36", "Воронежская область"], ["37", "Ивановская область"], ["38", "Иркутская область"],
    ["39", "Калининградская область"], ["40", "Калужская область"], ["41", "Камчатский край"], ["42", "Кемеровская область"],
    ["43", "Кировская область"], ["44", "Костромская область"], ["45", "Курганская область"],
    ["46", "Курская обл."], ["47", "Ленинградская обл."], ["48", "Липецкая обл."], ["49", "Магаданская обл."],
    ["50", "Московская обл."], ["51", "Мурманская обл."], ["52", "Нижегородская обл."], ["53", "Новгородская обл."],
    ["54", "Новосибирская обл."], ["55", "Омская обл."], ["56", "Оренбургская обл."], ["57", "Орловская обл."],
    ["58", "Пензенская обл."], ["59", "Пермский край"], ["60", "Псковская обл."], ["61", "Ростовская обл."],
    ["62", "Рязанская обл."], ["63", "Самарская обл."], ["64", "Саратовская обл."], ["65", "Сахалинская обл."],
    ["66", "Свердловская обл."], ["67", "Смоленская обл."], ["68", "Тамбовская обл."], ["69", "Тверская обл."],
    ["70", "Томская обл."], ["71", "Тульская обл."], ["72", "Тюменская обл."], ["73", "Ульяновская обл."],
    ["74", "Челябинская обл."], ["75", "Забайкальский край"], ["76", "Ярославская обл."], ["77", "г. Москва"],
    ["78", "г. Санкт-Петербург"], ["79", "Еврейская АО"], ["82", "Республика Крым"], ["83", "Ненецкий АО"],
    ["86", "ХМАО — Югра"], ["87", "Чукотский АО"], ["89", "Ямало-Ненецкий АО"], ["92", "г. Севастополь"]
];

// СУПЕР-ГЕНЕРАТОР ВЛОЖЕННЫХ ХАБОВ
function getNestedHubs(code, name) {
    const enc = encodeURIComponent(name);
    return [
        { id: "gov", title: "🏛️ Госуслуги и Власть", groups: [
            { label: "Основные", links: [["Госуслуги РФ", "https://www.gosuslugi.ru"], ["Мои Документы", "https://mfc.rf"]] },
            { label: "Ведомства", links: [["Налоговая (ФНС)", "https://lkfl2.nalog.ru"], ["Судебные долги", "https://fssp.gov.ru"], ["Администрация", `https://yandex.ru/search/?text=администрация+${enc}`]] }
        ]},
        { id: "apps", title: "📲 Магазины и Софт", groups: [
            { label: "Каталоги", links: [["RuStore (Наш маркет)", "https://www.rustore.ru"], ["AppGallery", "https://appgallery.huawei.com"]] },
            { label: "Общение", links: [["Telegram", "https://web.telegram.org"], ["VK Мессенджер", "https://vk.me"]] }
        ]},
        { id: "fin", title: "💰 Финансы и Банки", groups: [
            { label: "Топ Банков", links: [["Сбербанк", "https://www.sberbank.ru"], ["Т-Банк", "https://www.tbank.ru"], ["Альфа-Банк", "https://alfabank.ru"], ["ВТБ Онлайн", "https://www.vtb.ru"]] },
            { label: "Сервисы", links: [["Сравни.ру (Выбор)", "https://www.sravni.ru"], ["Цифровой Рубль", "https://www.cbr.ru/fintech/dr/"]] }
        ]},
        { id: "shop", title: "🛍️ Маркетплейсы", groups: [
            { label: "Шоппинг", links: [["Wildberries", "https://www.wildberries.ru"], ["Ozon", "https://www.ozon.ru"], ["Яндекс Маркет", "https://market.yandex.ru"]] },
            { label: "Объявления", links: [["Авито", "https://www.avito.ru"], ["Юла", "https://youla.ru"]] }
        ]},
        { id: "food", title: "🍕 Еда и Такси", groups: [
            { label: "Транспорт", links: [["Яндекс Go", "https://taxi.yandex.ru"], ["Ситимобил", "https://city-mobil.ru"]] },
            { label: "Доставка", links: [["Яндекс Еда", "https://eda.yandex.ru"], ["Самокат", "https://samokat.ru"], ["Купер", "https://kuper.ru"]] }
        ]},
        { id: "tour", title: "✈️ Туризм и Поездки", groups: [
            { label: "Билеты", links: [["Aviasales", "https://www.aviasales.ru"], ["РЖД Пассажирам", "https://www.rzd.ru"], ["Tutu.ru", "https://www.tutu.ru"]] },
            { label: "Жилье", links: [["Островок (Отели)", "https://ostrovok.ru"], ["Суточно.ру", "https://sutochno.ru"]] }
        ]},
        { id: "med", title: "🏥 Здравоохранение", groups: [
            { label: "Запись", links: [["Запись к врачу", "https://www.gosuslugi.ru/600447/1/form"], ["Регистратура", `https://yandex.ru/search/?text=регистратура+${enc}`]] },
            { label: "Аптеки", links: [["Поиск лекарств", "https://aptekamos.ru"], ["Еаптека", "https://www.eapteka.ru"]] }
        ]},
        { id: "hous", title: "💡 ЖКХ и Дом", groups: [
            { label: "Оплата", links: [["ГИС ЖКХ", "https://dom.gosuslugi.ru"], ["Квартплата.ру", "https://kvartplata.ru"]] },
            { label: "Услуги", links: [["Профи (Мастера)", "https://profi.ru"], ["ДомКлик", "https://domclick.ru"]] }
        ]}
    ];
}

// УПРАВЛЕНИЕ ИНТЕРФЕЙСОМ
const regInput = document.getElementById('regInput');
const regSuggests = document.getElementById('regSuggests');
const homeScreen = document.getElementById('home-screen');
const regionScreen = document.getElementById('region-screen');

regInput.addEventListener('input', (e) => {
    const val = e.target.value.toLowerCase().trim();
    regSuggests.innerHTML = '';
    if (val.length < 1) { regSuggests.style.display = 'none'; return; }
    const filtered = regionsDB.filter(r => r[1].toLowerCase().includes(val) || r[0].includes(val));
    if (filtered.length > 0) {
        regSuggests.style.display = 'block';
        filtered.forEach(r => {
            const div = document.createElement('div');
            div.className = 'suggest-item';
            div.innerHTML = `<span>📍 ${r[1]}</span> <small>${r[0]}</small>`;
            div.onclick = () => { window.location.hash = 'reg' + r[0]; };
            regSuggests.appendChild(div);
        });
    }
});

function renderRegion(code) {
    const reg = regionsDB.find(r => r[0] === code);
    if (!reg) return goHome();

    homeScreen.style.display = 'none';
    regionScreen.style.display = 'block';
    document.getElementById('regTitle').innerText = reg[1];
    document.getElementById('reg-badge').innerText = reg[1].toUpperCase();

    const grid = document.getElementById('megaGrid');
    const nav = document.getElementById('catNav');
    grid.innerHTML = '';
    nav.innerHTML = '';

    const data = getNestedHubs(reg[0], reg[1]);
    
    // Добавляем Метро для избранных городов
    const metroCodes = ["54", "77", "78", "16", "63", "52", "66"];
    if (metroCodes.includes(code)) {
        data.splice(2, 0, { id: "metro", title: "🚇 Метрополитен", groups: [
            { label: "Сервис", links: [["Схема и время", `https://yandex.ru/search/?text=схема+метро+${encodeURIComponent(reg[1])}`], ["Пополнить карту", `https://yandex.ru/search/?text=пополнить+транспортную+карту+${encodeURIComponent(reg[1])}`]] }
        ]});
    }

    data.forEach(cat => {
        // Кнопка меню
        const chip = document.createElement('div');
        chip.className = 'nav-chip';
        chip.innerText = cat.title.split(' ')[1] || cat.title;
        chip.onclick = () => document.getElementById('cat-' + cat.id).scrollIntoView({ behavior: 'smooth' });
        nav.appendChild(chip);

        // Карточка (Вложенный агрегатор)
        const card = document.createElement('div');
        card.className = 'card';
        card.id = 'cat-' + cat.id;
        
        let cardHTML = `<h3 class="card-h3">${cat.title}</h3>`;
        cat.groups.forEach(group => {
            cardHTML += `
                <div class="sub-group">
                    <span class="sub-title">${group.label}</span>
                    ${group.links.map(l => `<a href="${l[1]}" target="_blank" class="service-link">${l[0]} <span>➔</span></a>`).join('')}
                </div>
            `;
        });
        
        card.innerHTML = cardHTML;
        grid.appendChild(card);
    });
}

function goHome() {
    window.location.hash = '';
    homeScreen.style.display = 'flex';
    regionScreen.style.display = 'none';
    regInput.value = '';
    regSuggests.style.display = 'none';
}

function router() {
    const h = window.location.hash;
    if (h.startsWith('#reg')) {
        renderRegion(h.replace('#reg', ''));
    } else {
        goHome();
    }
}

window.addEventListener('hashchange', router);
window.addEventListener('load', router);
document.addEventListener('click', (e) => {
    if (!e.target.closest('#regInput')) regSuggests.style.display = 'none';
});
</script>
</body>
</html>
