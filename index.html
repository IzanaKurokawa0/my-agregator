<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>А | ГосНавигатор 2026 — Компакт-версия</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22white%22/><text y=%22.85em%22 x=%2210%22 font-size=%2285%22 font-family=%22Arial, sans-serif%22 font-weight=%22900%22 fill=%22%23ef4444%22>А</text></svg>">

    <style>
        :root {
            --bg: #f4f6f9;
            --card-bg: #ffffff;
            --text: #1e293b;
            --accent: #ef4444;
            --border: #e2e8f0;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0b0f1a;
                --card-bg: #161e2e;
                --text: #ffffff; 
                --border: #2d3748;
                --shadow: 0 8px 25px rgba(0,0,0,0.4);
            }
            .card-h3 { color: #ffffff !important; }
        }

        * { margin:0; padding:0; box-sizing:border-box; transition: 0.2s ease; scroll-behavior: smooth; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; font-size: 14px; }

        /* КОМПАКТНЫЙ HEADER */
        header { 
            background: var(--card-bg); padding: 10px 20px; border-bottom: 2px solid var(--accent);
            position: sticky; top: 0; z-index: 1000; box-shadow: var(--shadow);
        }
        .nav-inner { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; color: inherit; cursor: pointer; }
        .logo-box { 
            background: #fff; border: 2px solid var(--accent); color: var(--accent); 
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; 
            border-radius: 8px; font-weight: 900; font-size: 20px; 
        }

        /* ГЛАВНАЯ */
        #home-screen { padding: 40px 20px; text-align: center; max-width: 700px; margin: 0 auto; min-height: 70vh; display: flex; flex-direction: column; justify-content: center; }
        .hero-h1 { font-size: 2.2rem; font-weight: 900; letter-spacing: -1.5px; margin-bottom: 20px; }
        .main-input { 
            width: 100%; padding: 18px 25px; border-radius: 15px; border: 2px solid var(--border);
            font-size: 1.1rem; outline: none; background: var(--card-bg); color: var(--text); font-weight: 700;
        }

        /* РЕГИОНАЛЬНЫЙ ТЕРМИНАЛ (КОМПАКТ) */
        #region-screen { display: none; padding: 15px 15px 60px; max-width: 1600px; margin: 0 auto; }

        /* МНОГОУРОВНЕВОЕ МЕНЮ (ЧИПСЫ) */
        .category-nav { 
            background: var(--bg); padding: 10px 0; 
            position: sticky; top: 54px; z-index: 950; 
            display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
            border-bottom: 1px solid var(--border);
        }
        .nav-chip { 
            padding: 6px 12px; border-radius: 10px; background: var(--card-bg); 
            border: 1px solid var(--border); font-weight: 800; font-size: 0.75rem; cursor: pointer;
        }
        .nav-chip:hover { border-color: var(--accent); color: var(--accent); }

        /* СЕТКА БЛОКОВ (КОМПАКТНАЯ) */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 15px; margin-top: 20px; 
        }
        .card { 
            background: var(--card-bg); border-radius: 20px; padding: 20px; 
            border: 1px solid var(--border); box-shadow: var(--shadow);
            scroll-margin-top: 150px;
        }
        .card-h3 { font-size: 1.15rem; font-weight: 900; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        
        .service-link { 
            display: flex; justify-content: space-between; align-items: center; 
            text-decoration: none; color: var(--text); padding: 8px 0; 
            border-bottom: 1px solid var(--border); font-weight: 600; font-size: 0.9rem;
        }
        .service-link:hover { color: var(--accent); padding-left: 4px; }
        .tag { font-size: 0.65rem; background: var(--bg); padding: 2px 6px; border-radius: 6px; opacity: 0.7; }

        footer { padding: 40px 20px; text-align: center; font-size: 0.8rem; color: var(--muted); border-top: 1px solid var(--border); margin-top: 40px; }

        /* ПОДСКАЗКИ */
        .suggest-list { 
            position: absolute; top: 70px; left: 0; right: 0; background: var(--card-bg); 
            border-radius: 15px; box-shadow: var(--shadow); z-index: 100; display: none; padding: 10px; border: 1px solid var(--border);
        }
        .suggest-item { padding: 12px 20px; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; font-weight: 700; }
        .suggest-item:hover { background: var(--accent); color: white; }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            .category-nav { justify-content: flex-start; max-height: 120px; overflow-y: auto; }
        }
    </style>
</head>
<body>

<header>
    <div class="nav-inner">
        <div class="logo" onclick="goHome()">
            <div class="logo-box">А</div>
            <div style="font-size: 1.2rem; font-weight: 900; letter-spacing: -0.5px;">ГосНавигатор</div>
        </div>
        <div id="reg-badge" style="font-weight: 900; color: #fff; background: var(--accent); padding: 4px 10px; border-radius: 8px; font-size: 0.7rem;">2026</div>
    </div>
</header>

<main id="home-screen">
    <h1 class="hero-h1">Цифровая жизнь региона</h1>
    <div style="position: relative; width: 100%;">
        <input type="text" id="regInput" class="main-input" placeholder="Введите название (напр. Новосибирск)..." autocomplete="off">
        <div id="regSuggests" class="suggest-list"></div>
    </div>
</main>

<main id="region-screen">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <h2 id="regTitle" style="font-size: 1.8rem; font-weight: 900;">Регион</h2>
        <button onclick="goHome()" style="padding: 8px 15px; border-radius: 10px; border: 1px solid var(--border); font-size: 0.8rem; font-weight: 800; cursor: pointer; background: var(--card-bg); color: var(--text);">СМЕНИТЬ</button>
    </div>
    <nav class="category-nav" id="catNav"></nav>
    <div id="megaGrid" class="grid"></div>
</main>

<footer>
    <p>© 2026 GOS-NAVIGATOR-PROJECT.RU — Кирилл Черняков, 25132БУ</p>
</footer>

<script>

    ["66", "Свердловская обл."], ["67", "Смоленская обл."], ["68", "Тамбовская обл."], ["69", "Тверская обл."],
    ["70", "Томская обл."], ["71", "Тульская обл."], ["72", "Тюменская обл."], ["73", "Ульяновская обл."],
    ["74", "Челябинская обл."], ["75", "Забайкальский край"], ["76", "Ярославская обл."], ["77", "г. Москва"],
    ["78", "г. Санкт-Петербург"], ["79", "Еврейская АО"], ["82", "Республика Крым"], ["83", "Ненецкий АО"],
    ["86", "ХМАО — Югра"], ["87", "Чукотский АО"], ["89", "Ямало-Ненецкий АО"], ["92", "г. Севастополь"]

// ГИПЕР-ГЕНЕРАТОР СЕРВИСОВ 2026

    let list = [

        { id: "fin", title: "💰 Финансы", links: [["Сбербанк", "https://online.sberbank.ru"], ["Т-Банк", "https://www.tbank.ru"], ["Альфа-Банк", "https://alfabank.ru"], ["ВТБ Онлайн", "https://online.vtb.ru"], ["Газпромбанк", "https://www.gazprombank.ru"], ["Цифровой Рубль", "https://www.cbr.ru/fintech/dr/"]] },

        { id: "med", title: "🏥 Здоровье", links: [["Запись к врачу", "https://www.gosuslugi.ru/600447/1/form"], ["Эл. Регистратура", `https://yandex.ru/search/?text=регистратура+${enc}`], ["Аптеки (Поиск)", "https://aptekamos.ru"], ["СберЗдоровье", "https://sberhealth.ru"], ["Инвитро", "https://www.invitro.ru"]] },

        { id: "comm", title: "📱 Связь", links: [["Почта России", "https://www.pochta.ru"], ["Спидтест", "https://www.speedtest.net"], ["Реестр связи", "https://rkn.gov.ru"]] },
        
        { id: "sport", title: "⚽ Спорт", links: [["ГТО", "https://www.gto.ru"], ["Запись в секции", "https://www.gosuslugi.ru/600363/1/form"], ["Марафоны", "https://russiarunning.com"]] },
        
        { id: "tour", title: "🌍 Туризм", links: [["Путешествуем.рф", "https://russia.travel"], ["Отели (Островок)", "https://ostrovok.ru"], ["Маршруты", "https://www.marshruty.ru"]] }

    const metroCodes = ["54", "77", "78", "16", "63", "52", "66"];
    if (metroCodes.includes(code)) {
        list.splice(5, 0, { id: "metro", title: "🚇 Метро", links: [["Схема и время", `https://yandex.ru/search/?text=схема+метро+${enc}`], ["Пополнить карту", `https://yandex.ru/search/?text=пополнить+транспортную+карту+${enc}`]] });

}

// УПРАВЛЕНИЕ
const regInput = document.getElementById('regInput');
const regSuggests = document.getElementById('regSuggests');
const homeScreen = document.getElementById('home-screen');
const regionScreen = document.getElementById('region-screen');

regInput.addEventListener('input', (e) => {
    const val = e.target.value.toLowerCase().trim();
    regSuggests.innerHTML = '';
    if (val.length < 1) { regSuggests.style.display = 'none'; return; }
    const filtered = regionsDB.filter(r => r[1].toLowerCase().includes(val) || r[0].includes(val));
    if (filtered.length > 0) {
        regSuggests.style.display = 'block';
        filtered.forEach(r => {
            const div = document.createElement('div');
            div.className = 'suggest-item';
            div.innerHTML = `<span>📍 ${r[1]}</span> <small>${r[0]}</small>`;
            div.onclick = () => { window.location.hash = 'reg' + r[0]; };
            regSuggests.appendChild(div);
        });
    }
});

function renderRegion(code) {
    const reg = regionsDB.find(r => r[0] === code);
    if (!reg) return goHome();

    homeScreen.style.display = 'none';
    regionScreen.style.display = 'block';
    document.getElementById('regTitle').innerText = reg[1];
    document.getElementById('reg-badge').innerText = reg[1].toUpperCase();

    const grid = document.getElementById('megaGrid');
    const nav = document.getElementById('catNav');
    grid.innerHTML = '';
    nav.innerHTML = '';

    const data = getMegaData(reg[0], reg[1]);
    data.forEach(cat => {
        // Кнопка меню
        const chip = document.createElement('div');
        chip.className = 'nav-chip';
        chip.innerText = cat.title;
        chip.onclick = () => {
            document.getElementById('cat-' + cat.id).scrollIntoView({ behavior: 'smooth' });
        };
        nav.appendChild(chip);

        // Карточка
        const card = document.createElement('div');
        card.className = 'card';
        card.id = 'cat-' + cat.id;
        card.innerHTML = `
            <h3 class="card-h3">${cat.title}</h3>
            ${cat.links.map(l => `<a href="${l[1]}" target="_blank" class="service-link">${l[0]} <span class="tag">➔</span></a>`).join('')}
        `;
        grid.appendChild(card);
    });
}

function goHome() {
    window.location.hash = '';
    homeScreen.style.display = 'flex';
    regionScreen.style.display = 'none';
    regInput.value = '';
    regSuggests.style.display = 'none';
    document.getElementById('reg-badge').innerText = '2026';
}

function router() {
    const h = window.location.hash;
    if (h.startsWith('#reg')) {
        renderRegion(h.replace('#reg', ''));
    } else {
        goHome();
    }
}

window.addEventListener('hashchange', router);
window.addEventListener('load', router);
document.addEventListener('click', (e) => {
    if (!e.target.closest('#regInput')) regSuggests.style.display = 'none';
});
</script>
</body>
</html>
