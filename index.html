<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>А | ГосНавигатор 2026 — Ультимативное Окно</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%2294%22 height=%2294%22 x=%223%22 y=%223%22 rx=%2222%22 fill=%22white%22 stroke=%22%23ef4444%22 stroke-width=%226%22/><text y=%2275%22 x=%2222%22 font-size=%2275%22 font-family=%22Arial, sans-serif%22 font-weight=%22900%22 fill=%22%23ef4444%22>А</text></svg>">

    <style>
        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --accent: #ef4444;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #020617;
                --card-bg: #0f172a;
                --text: #ffffff; 
                --border: #1e293b;
                --shadow: 0 20px 50px rgba(0,0,0,0.5);
            }
            .card-h3 { color: #ffffff !important; }
            summary { color: #94a3b8 !important; }
        }

        * { margin:0; padding:0; box-sizing:border-box; transition: 0.2s ease; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 13px; line-height: 1.4; overflow-x: hidden; }

        header { 
            background: var(--card-bg); padding: 10px 16px; border-bottom: 2px solid var(--accent);
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-inner { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo-box { background: #fff; border: 2px solid var(--accent); color: var(--accent); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: 900; font-size: 20px; }

        #home-screen { padding: 60px 16px; text-align: center; max-width: 600px; margin: 0 auto; min-height: 70vh; display: flex; flex-direction: column; justify-content: center; }
        .hero-h1 { font-size: 2.5rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 20px; }
        .main-search { width: 100%; padding: 18px 25px; border-radius: 15px; border: 2px solid var(--border); font-size: 1.1rem; outline: none; background: var(--card-bg); color: var(--text); font-weight: 700; }

        #region-screen { display: none; padding: 10px; max-width: 1600px; margin: 0 auto; }

        /* МЕНЮ-ЧИПСЫ В 2-3 РЯДА */
        .cat-nav { 
            background: var(--bg); padding: 10px 0; border-bottom: 1px solid var(--border); margin-bottom: 20px;
            display: flex; flex-wrap: wrap; gap: 8px; position: sticky; top: 54px; z-index: 999;
        }
        .nav-chip { padding: 6px 12px; border-radius: 10px; background: var(--card-bg); border: 1.5px solid var(--border); font-weight: 800; font-size: 0.75rem; cursor: pointer; }
        .nav-chip:hover { border-color: var(--accent); color: var(--accent); }

        /* КАРТОЧКИ С УМНЫМ СПОЙЛЕРОМ */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 15px; }
        .card { 
            background: var(--card-bg); border-radius: 24px; padding: 20px; 
            border: 1px solid var(--border); box-shadow: var(--shadow);
            display: flex; flex-direction: column; scroll-margin-top: 160px;
        }
        .card-h3 { font-size: 1.25rem; font-weight: 900; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        
        .service-link { 
            display: flex; justify-content: space-between; align-items: center; 
            text-decoration: none; color: var(--text); padding: 8px 0; 
            border-bottom: 1px solid rgba(0,0,0,0.03); font-weight: 700;
        }
        .service-link:hover { color: var(--accent); padding-left: 4px; }

        /* СПОЙЛЕР "ОСТАЛЬНОЕ" */
        details { margin-top: 10px; border-top: 1px dashed var(--border); padding-top: 10px; }
        summary { cursor: pointer; font-weight: 900; color: var(--muted); list-style: none; display: flex; align-items: center; gap: 5px; font-size: 0.75rem; }
        summary::before { content: "➕"; font-size: 0.7rem; }
        details[open] summary::before { content: "➖"; }

        .suggest-list { position: absolute; top: 65px; left: 0; right: 0; background: var(--card-bg); border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 100; display: none; padding: 10px; border: 2px solid var(--border); }
        .suggest-item { padding: 12px 16px; border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; font-weight: 800; }
        .suggest-item:hover { background: var(--accent); color: white; }

        footer { padding: 60px 20px; text-align: center; border-top: 1px solid var(--border); color: var(--muted); font-weight: 800; margin-top: 60px; }
    </style>
</head>
<body>

<header>
    <div class="nav-inner">
        <div class="logo" onclick="goHome()" style="display:flex; align-items:center; gap:8px; cursor:pointer;">
            <div class="logo-box">А</div>
            <div style="font-weight: 900; letter-spacing: -0.5px; font-size: 1.1rem;">ГосНавигатор</div>
        </div>
        <div id="status-badge" style="background:var(--accent); color:#fff; padding:4px 10px; border-radius:6px; font-weight:900; font-size:0.7rem;">2026 PRO</div>
    </div>
</header>

<main id="home-screen">
    <h1 class="hero-h1">Весь цифровой мир <br>вашего региона.</h1>
    <div style="position: relative; width: 100%;">
        <input type="text" id="regInput" class="main-input" placeholder="Введите название региона (напр. 54 или Новосибирск)..." autocomplete="off">
        <div id="regSuggests" class="suggest-list"></div>
    </div>
</main>

<main id="region-screen">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h2 id="regTitle" style="font-size: 1.8rem; font-weight: 900;">Регион</h2>
        <button onclick="goHome()" style="padding: 8px 16px; border-radius: 10px; border: 1px solid var(--border); font-weight: 800; cursor: pointer; background: var(--card-bg); color: var(--text);">СМЕНИТЬ</button>
    </div>
    <nav class="cat-nav" id="catNav"></nav>
    <div id="megaGrid" class="grid"></div>
</main>

<footer>
    <p>© 2026 GOS-NAVIGATOR-PROJECT.RU — Кирилл Черняков, 25132БУ</p>
</footer>

// ЛОГИКА ИНТЕРФЕЙСА
const regInput = document.getElementById('regInput');
const regSuggests = document.getElementById('regSuggests');
const homeScreen = document.getElementById('home-screen');
const regionScreen = document.getElementById('region-screen');

regInput.addEventListener('input', (e) => {
    const val = e.target.value.toLowerCase().trim();
    regSuggests.innerHTML = '';
    if (val.length < 1) { regSuggests.style.display = 'none'; return; }
    const filtered = regionsDB.filter(r => r[1].toLowerCase().includes(val) || r[0].includes(val));
    if (filtered.length > 0) {
        regSuggests.style.display = 'block';
        filtered.forEach(r => {
            const div = document.createElement('div');
            div.className = 'suggest-item';
            div.innerHTML = `<span>📍 ${r[1]}</span> <small>${r[0]}</small>`;
            div.onclick = () => { window.location.hash = 'reg' + r[0]; };
            regSuggests.appendChild(div);
        });
    }
});

function renderRegion(code) {
    const reg = regionsDB.find(r => r[0] === code);
    if (!reg) return goHome();

    homeScreen.style.display = 'none';
    regionScreen.style.display = 'block';
    document.getElementById('regTitle').innerText = reg[1];
    document.getElementById('status-badge').innerText = reg[1].toUpperCase();

    const grid = document.getElementById('megaGrid');
    const nav = document.getElementById('catNav');
    grid.innerHTML = '';
    nav.innerHTML = '';

    const hubs = getMegaHubs(reg[0], reg[1]);
    
    // Метро для городов с подземкой
    const metroCodes = ["54", "77", "78", "16", "63", "52", "66"];
    if (metroCodes.includes(code)) {
        hubs.splice(2, 0, { id: "metro", title: "🚇 Метрополитен", top: [
            ["Схема и время", `https://yandex.ru/search/?text=схема+метро+${encodeURIComponent(reg[1])}`],
            ["Пополнить карту", `https://yandex.ru/search/?text=пополнить+карту+метро+${encodeURIComponent(reg[1])}`]
        ], other: [] });
    }

    hubs.forEach(hub => {
        // Добавление в меню навигации
        const chip = document.createElement('div');
        chip.className = 'nav-chip';
        chip.innerText = hub.title.split(' ')[1] || hub.title;
        chip.onclick = () => document.getElementById('hub-' + hub.id).scrollIntoView({ behavior: 'smooth' });
        nav.appendChild(chip);

        // Создание карточки
        const card = document.createElement('div');
        card.className = 'card';
        card.id = 'hub-' + hub.id;
        
        let html = `<h3 class="card-h3">${hub.title}</h3>`;
        
        // Рендерим ТОП
        hub.top.forEach(l => {
            html += `<a href="${l[1]}" target="_blank" class="service-link">${l[0]} <span>➔</span></a>`;
        });

        // Рендерим спойлер "ОСТАЛЬНОЕ", если есть ссылки
        if (hub.other.length > 0) {
            html += `
                <details>
                    <summary>ПОКАЗАТЬ ВСЁ (${hub.other.length})</summary>
                    <div style="margin-top: 10px;">
                        ${hub.other.map(l => `<a href="${l[1]}" target="_blank" class="service-link">${l[0]} <small>➔</small></a>`).join('')}
                    </div>
                </details>
            `;
        }
        
        card.innerHTML = html;
        grid.appendChild(card);
    });
}

function goHome() {
    window.location.hash = '';
    homeScreen.style.display = 'flex';
    regionScreen.style.display = 'none';
    regInput.value = '';
    regSuggests.style.display = 'none';
}

function router() {
    const h = window.location.hash;
    if (h.startsWith('#reg')) {
        renderRegion(h.replace('#reg', ''));
    } else {
        goHome();
    }
}

window.addEventListener('hashchange', router);
window.addEventListener('load', router);
document.addEventListener('click', (e) => {
    if (!e.target.closest('#regInput')) regSuggests.style.display = 'none';
});
</script>
</body>
</html>
