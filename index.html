    <meta charset="UTF-8">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%2294%22 height=%2294%22 x=%223%22 y=%223%22 rx=%2222%22 fill=%22white%22 stroke=%22%23ef4444%22 stroke-width=%226%22/><text y=%2275%22 x=%2222%22 font-size=%2275%22 font-family=%22Arial, sans-serif%22 font-weight=%22900%22 fill=%22%23ef4444%22>А</text></svg>">

    <style>
        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
            --accent: #ef4444;
            --border: #e2e8f0;
            --shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #020617;
                --card-bg: #0f172a;
                --text: #ffffff; 
                --muted: #94a3b8;
                --border: #1e293b;
                --shadow: 0 20px 60px rgba(0,0,0,0.6);
            }
            .card-h3 { color: #ffffff !important; }
        }

        * { margin:0; padding:0; box-sizing:border-box; transition: 0.25s ease; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* HEADER */
        header { 
            background: var(--card-bg); padding: 12px 20px; border-bottom: 3px solid var(--accent);
            position: sticky; top: 0; z-index: 1000; box-shadow: var(--shadow);
        }
        .nav-inner { max-width: 1800px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo-box { 
            background: #fff; border: 2.5px solid var(--accent); color: var(--accent); 
            width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; 
            border-radius: 10px; font-weight: 900; font-size: 22px; 
        }

        /* ГЛАВНАЯ С ГИГАНТСКИМ ПОИСКОМ */
        #home-screen { padding: 60px 20px; text-align: center; max-width: 1000px; margin: 0 auto; min-height: 80vh; display: flex; flex-direction: column; justify-content: center; }
        .hero-h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 950; letter-spacing: -3px; margin-bottom: 40px; line-height: 1; }
        
        .main-search-wrapper { position: relative; width: 100%; max-width: 850px; margin: 0 auto; }
        .main-input { 
            width: 100%; padding: 35px 45px; border-radius: 60px; border: 4px solid var(--border);
            font-size: 1.6rem; outline: none; background: var(--card-bg); color: var(--text); font-weight: 800;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
        }
        .main-input:focus { border-color: var(--accent); transform: translateY(-5px); }

        /* ЭКРАН РЕГИОНА */
        #region-screen { display: none; padding: 15px 15px 100px; max-width: 1800px; margin: 0 auto; }

        /* НАВИГАЦИЯ (ЧИПСЫ В 2-3 РЯДА) */
        .cat-nav { 
            background: var(--bg); padding: 15px 0; border-bottom: 2px solid var(--border); 
            position: sticky; top: 65px; z-index: 950; 
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
        }
        .nav-chip { 
            padding: 8px 16px; border-radius: 12px; background: var(--card-bg); 
            border: 1.5px solid var(--border); font-weight: 800; font-size: 0.8rem; cursor: pointer;
        }
        .nav-chip:hover { border-color: var(--accent); color: var(--accent); }

        /* ГИГАНТСКАЯ СЕТКА (5 В РЯД НА ПК) */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 15px; margin-top: 25px; 
        }

        .card { 
            background: var(--card-bg); border-radius: 24px; padding: 20px; 
            border: 1px solid var(--border); box-shadow: var(--shadow);
            display: flex; flex-direction: column; scroll-margin-top: 180px;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .card-h3 { font-size: 1.15rem; font-weight: 900; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        
        .service-link { 
            display: flex; justify-content: space-between; align-items: center; 
            text-decoration: none; color: var(--text); padding: 8px 0; 
            border-bottom: 1px solid rgba(0,0,0,0.03); font-weight: 700; font-size: 0.95rem;
        }
        .service-link:hover { color: var(--accent); padding-left: 5px; }

        /* СПОЙЛЕР */
        details { margin-top: 8px; }
        summary { cursor: pointer; font-weight: 900; color: var(--muted); list-style: none; font-size: 0.75rem; text-transform: uppercase; }
        summary:hover { color: var(--accent); }

        footer { padding: 80px 24px; text-align: center; border-top: 2px solid var(--border); color: var(--muted); font-weight: 800; margin-top: 60px; }

        /* ПОДСКАЗКИ */
        .suggest-list { 
            position: absolute; top: 110px; left: 0; right: 0; background: var(--card-bg); 
            border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); z-index: 100; display: none; padding: 15px;
        }
        .suggest-item { padding: 15px 25px; border-radius: 15px; cursor: pointer; display: flex; justify-content: space-between; font-weight: 800; font-size: 1.2rem; }
        .suggest-item:hover { background: var(--accent); color: white; }

        /* АДАПТИВНОСТЬ */
        @media (max-width: 1600px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 1200px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { 
            .grid { grid-template-columns: 1fr; } 
            .hero-h1 { font-size: 2.2rem; }
            .cat-nav { justify-content: flex-start; overflow-x: auto; flex-wrap: nowrap; padding: 10px; }
        }

</head>

// ЛОГИКА
const regInput = document.getElementById('regInput');
const regSuggests = document.getElementById('regSuggests');
const homeScreen = document.getElementById('home-screen');
const regionScreen = document.getElementById('region-screen');

regInput.addEventListener('input', (e) => {
    const val = e.target.value.toLowerCase().trim();
    regSuggests.innerHTML = '';
    if (val.length < 1) { regSuggests.style.display = 'none'; return; }
    const filtered = regionsDB.filter(r => r[1].toLowerCase().includes(val) || r[0].includes(val));
    if (filtered.length > 0) {
        regSuggests.style.display = 'block';
        filtered.forEach(r => {
            const div = document.createElement('div');
            div.className = 'suggest-item';
            div.innerHTML = `<span>📍 ${r[1]}</span> <small>${r[0]}</small>`;
            div.onclick = () => { window.location.hash = 'reg' + r[0]; };
            regSuggests.appendChild(div);
        });
    }
});

function renderRegion(code) {
    const reg = regionsDB.find(r => r[0] === code);
    if (!reg) return goHome();

    homeScreen.style.display = 'none';
    regionScreen.style.display = 'block';
    document.getElementById('regTitle').innerText = reg[1];

    const grid = document.getElementById('megaGrid');
    const nav = document.getElementById('catNav');
    grid.innerHTML = '';
    nav.innerHTML = '';

    const hubs = getServicesFull(reg[0], reg[1]);
    
    // Метро-детектор
    const metroCodes = ["54", "77", "78", "16", "63", "52", "66"];
    if (metroCodes.includes(code)) {
        hubs.splice(5, 0, { id: "metro", title: "🚇 Метро", top: [
            ["Схема и время", `https://yandex.ru/search/?text=схема+метро+${encodeURIComponent(reg[1])}`],
            ["Пополнить карту", `https://yandex.ru/search/?text=пополнить+карту+метро+${encodeURIComponent(reg[1])}`]
        ], other: [] });
    }

    hubs.forEach(hub => {
        // Чипсы навигации
        const chip = document.createElement('div');
        chip.className = 'nav-chip';
        chip.innerText = hub.title.split(' ')[1] || hub.title;
        chip.onclick = () => document.getElementById('hub-' + hub.id).scrollIntoView({ behavior: 'smooth' });
        nav.appendChild(chip);

        // Карточка
        const card = document.createElement('div');
        card.className = 'card';
        card.id = 'hub-' + hub.id;
        
        let html = `<h3 class="card-h3">${hub.title}</h3>`;
        hub.top.forEach(l => {
            html += `<a href="${l[1]}" target="_blank" class="service-link">${l[0]} <span>➔</span></a>`;
        });

        if (hub.other && hub.other.length > 0) {
            html += `
                <details>
                    <summary>ПОКАЗАТЬ ВСЁ (${hub.other.length})</summary>
                    <div style="margin-top:10px; border-top:1px solid rgba(0,0,0,0.05); padding-top:5px;">
                        ${hub.other.map(l => `<a href="${l[1]}" target="_blank" class="service-link" style="font-size:0.85rem; opacity:0.8;">${l[0]} <small>➔</small></a>`).join('')}
                    </div>
                </details>
            `;
        }
        
        card.innerHTML = html;
        grid.appendChild(card);
    });
}

function goHome() {
    window.location.hash = '';
    homeScreen.style.display = 'flex';
    regionScreen.style.display = 'none';
    regInput.value = '';
    regSuggests.style.display = 'none';
}

function router() {
    const h = window.location.hash;
    if (h.startsWith('#reg')) {
        renderRegion(h.replace('#reg', ''));
    } else {
        goHome();
    }
}

window.addEventListener('hashchange', router);
window.addEventListener('load', router);
document.addEventListener('click', (e) => {
    if (!e.target.closest('#regInput')) regSuggests.style.display = 'none';
});
</script>
</body>
</html>
