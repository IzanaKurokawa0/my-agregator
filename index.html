<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ГосНавигатор 2026 — Интеллектуальный Хаб РФ</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%2294%22 height=%2294%22 x=%223%22 y=%223%22 rx=%2222%22 fill=%22white%22 stroke=%22%23ef4444%22 stroke-width=%226%22/><text y=%2275%22 x=%2222%22 font-size=%2275%22 font-family=%22Arial, sans-serif%22 font-weight=%22900%22 fill=%22%23ef4444%22>А</text></svg>">

    <style>
        :root {
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text: #0f172a;
            --accent: #ef4444;
            --border: #e2e8f0;
            --muted: #64748b;
            --header-bg: #f1f5f9; /* Совпадает с фоном, чтобы не было просветов */
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #020617;
                --card-bg: #0f172a;
                --text: #f8fafc; 
                --border: #1e293b;
                --header-bg: #020617;
            }
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

        /* HEADER - ПОЛНОСТЬЮ ЗАКРАШЕН, БЕЗ ПРОСВЕТОВ */
        header { 
            background: var(--header-bg); 
            padding: 15px 20px; 
            border-bottom: 3px solid var(--accent);
            position: sticky; 
            top: 0; 
            z-index: 9999; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .nav-inner { max-width: 1600px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo-box { background: var(--accent); color: #fff; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-weight: 900; font-size: 22px; }

        /* ГЛАВНЫЙ ЭКРАН */
        #home-screen { padding: 100px 20px; text-align: center; max-width: 900px; margin: 0 auto; min-height: 80vh; display: flex; flex-direction: column; justify-content: center; }
        .hero-h1 { font-size: 3.5rem; font-weight: 950; letter-spacing: -3px; margin-bottom: 40px; line-height: 0.9; }
        .main-input { width: 100%; padding: 30px; border-radius: 25px; border: 4px solid var(--border); font-size: 1.5rem; outline: none; background: var(--card-bg); color: var(--text); font-weight: 800; box-shadow: 0 25px 50px rgba(0,0,0,0.1); }
        .main-input:focus { border-color: var(--accent); }

        /* ЭКРАН РЕГИОНА */
        #region-screen { display: none; padding: 20px; max-width: 1800px; margin: 0 auto; }

        /* ЧИПСЫ КАТЕГОРИЙ */
        .cat-nav { 
            display: flex; gap: 10px; overflow-x: auto; padding: 15px 0; 
            position: sticky; top: 70px; background: var(--header-bg); z-index: 9000;
            scrollbar-width: none;
        }
        .nav-chip { white-space: nowrap; padding: 10px 20px; border-radius: 15px; background: var(--card-bg); border: 2px solid var(--border); font-weight: 900; cursor: pointer; font-size: 0.9rem; }
        .nav-chip:hover { border-color: var(--accent); color: var(--accent); }

        /* ГРИД КАРТОЧЕК */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { 
            background: var(--card-bg); border-radius: 30px; padding: 25px; 
            border: 1px solid var(--border); display: flex; flex-direction: column;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .card-h3 { font-size: 1.3rem; font-weight: 950; margin-bottom: 20px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        
        /* ССЫЛКИ СЕРВИСОВ */
        .service-link { 
            display: flex; justify-content: space-between; align-items: center; 
            text-decoration: none; color: var(--text); padding: 14px 18px; 
            margin-bottom: 10px; border-radius: 15px; background: var(--bg);
            font-weight: 800; font-size: 1rem; border: 2px solid transparent;
        }
        .service-link:hover { border-color: var(--accent); background: var(--card-bg); transform: translateX(5px); }
        .service-link span { font-size: 0.7rem; background: var(--accent); color: #fff; padding: 3px 8px; border-radius: 6px; }
        .service-link.web span { background: var(--muted); }

        /* СПОЙЛЕР ДЛЯ ОСТАЛЬНЫХ */
        details { margin-top: 10px; }
        summary { 
            cursor: pointer; font-weight: 900; color: var(--muted); list-style: none; 
            font-size: 0.8rem; text-align: center; padding: 12px; border-radius: 15px;
            background: var(--border); transition: 0.3s;
        }
        summary:hover { background: var(--accent); color: #fff; }

        /* ПОДСКАЗКИ */
        .suggest-list { position: absolute; top: 120px; left: 0; right: 0; background: var(--card-bg); border-radius: 25px; box-shadow: 0 30px 60px rgba(0,0,0,0.3); z-index: 10000; display: none; overflow: hidden; }
        .suggest-item { padding: 20px 30px; cursor: pointer; display: flex; justify-content: space-between; font-weight: 900; font-size: 1.2rem; border-bottom: 1px solid var(--border); }
        .suggest-item:hover { background: var(--accent); color: white; }

        footer { padding: 60px; text-align: center; font-weight: 900; opacity: 0.5; letter-spacing: 2px; }
    </style>
</head>
<body>

<header>
    <div class="nav-inner">
        <div class="logo" onclick="goHome()" style="display:flex; align-items:center; gap:12px; cursor:pointer;">
            <div class="logo-box">А</div>
            <div style="font-weight: 950; font-size: 1.4rem; letter-spacing: -1px;">ГОСНАВИГАТОР 2026</div>
        </div>
        <div style="font-weight:900; background:#000; color:#fff; padding:5px 15px; border-radius:10px; font-size:0.8rem;">V. 3.0 FINAL</div>
    </div>
</header>

<main id="home-screen">
    <h1 class="hero-h1">Цифровая<br>Россия 2026.</h1>
    <div style="position: relative; width: 100%;">
        <input type="text" id="regInput" class="main-input" placeholder="Введите регион или код (напр. 54)..." autocomplete="off">
        <div id="regSuggests" class="suggest-list"></div>
    </div>
</main>

<main id="region-screen">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 20px;">
        <h2 id="regTitle" style="font-size: 3rem; font-weight: 950; letter-spacing: -2px; line-height: 1;">Регион</h2>
        <button onclick="goHome()" style="padding: 15px 30px; border-radius: 20px; border: none; font-weight: 900; background: var(--text); color: var(--card-bg); cursor: pointer;">СМЕНИТЬ СУБЪЕКТ</button>
    </div>
    <nav class="cat-nav" id="catNav"></nav>
    <div id="megaGrid" class="grid"></div>
</main>

<footer>
    <p>© 2026 GOS-NAVIGATOR PROJECT — FUTURE IS NOW</p>
</footer>

<script>
// ПОЛНАЯ БАЗА 89 РЕГИОНОВ
const regionsDB = [
    ["01", "Адыгея"], ["02", "Башкортостан"], ["03", "Бурятия"], ["04", "Алтай"], ["05", "Дагестан"], ["06", "Ингушетия"],
    ["07", "Кабардино-Балкария"], ["08", "Калмыкия"], ["09", "Карачаево-Черкесия"], ["10", "Карелия"], ["11", "Коми"],
    ["12", "Марий Эл"], ["13", "Мордовия"], ["14", "Якутия"], ["15", "Северная Осетия"], ["16", "Татарстан"],
    ["17", "Тыва"], ["18", "Удмуртия"], ["19", "Хакасия"], ["21", "Чувашия"], ["22", "Алтайский край"],
    ["23", "Краснодарский край"], ["24", "Красноярский край"], ["25", "Приморский край"], ["26", "Ставропольский край"],
    ["27", "Хабаровский край"], ["28", "Амурская область"], ["29", "Архангельская область"], ["30", "Астраханская область"],
    ["31", "Белгородская область"], ["32", "Брянская область"], ["33", "Владимирская область"], ["34", "Волгоградская область"],
    ["35", "Вологодская область"], ["36", "Воронежская область"], ["37", "Ивановская область"], ["38", "Иркутская область"],
    ["39", "Калининградская область"], ["40", "Калужская область"], ["41", "Камчатский край"], ["42", "Кемеровская область"],
    ["43", "Кировская область"], ["44", "Костромская область"], ["45", "Курганская область"], ["46", "Курская обл."], 
    ["47", "Ленинградская обл."], ["48", "Липецкая обл."], ["49", "Магаданская обл."], ["50", "Московская обл."], 
    ["51", "Мурманская обл."], ["52", "Нижегородская обл."], ["53", "Новгородская обл."], ["54", "Новосибирская обл."], 
    ["55", "Омская обл."], ["56", "Оренбургская обл."], ["57", "Орловская обл."], ["58", "Пензенская обл."], 
    ["59", "Пермский край"], ["60", "Псковская обл."], ["61", "Ростовская обл."], ["62", "Рязанская обл."], 
    ["63", "Самарская обл."], ["64", "Саратовская обл."], ["65", "Сахалинская обл."], ["66", "Свердловская обл."], 
    ["67", "Смоленская обл."], ["68", "Тамбовская обл."], ["69", "Тверская обл."], ["70", "Томская обл."], 
    ["71", "Тульская обл."], ["72", "Тюменская обл."], ["73", "Ульяновская обл."], ["74", "Челябинская обл."], 
    ["75", "Забайкальский край"], ["76", "Ярославская обл."], ["77", "г. Москва"], ["78", "г. Санкт-Петербург"], 
    ["79", "Еврейская АО"], ["82", "Республика Крым"], ["83", "Ненецкий АО"], ["86", "ХМАО — Югра"], 
    ["87", "Чукотский АО"], ["89", "Ямало-Ненецкий АО"], ["92", "г. Севастополь"]
];

function getHubs(code, name) {
    // Стек 2026
    const baseFin = [["СберOS", "app"], ["Т-Банк 3.0", "app"], ["Альфа-Мир", "app"], ["Цифровой Рубль", "web"], ["ВТБ Online", "web"]];
    const baseShop = [["Ozon Сфера", "app"], ["WB Global", "app"], ["Яндекс Маркет", "app"], ["МегаМаркет", "web"], ["Avito Бартер", "web"]];
    const baseMove = [["Яндекс Go (AI)", "app"], ["Fater (Убер 2.0)", "app"], ["2ГИС Спутник", "app"], ["Whoosh", "web"], ["Ситидрайв", "web"]];
    const baseLife = [["MAX Messenger", "app"], ["ГосНейро (Услуги)", "app"], ["RuStore 2026", "app"], ["Яндекс Музыка", "web"], ["ВК Видео", "web"]];

    let hubs = [
        { id: "fin", title: "💰 Финансы", items: baseFin },
        { id: "shop", title: "🛍️ Покупки", items: baseShop },
        { id: "move", title: "🚕 Транспорт", items: baseMove },
        { id: "life", title: "📱 Жизнь", items: baseLife }
    ];

    // ИНДИВИДУАЛЬНОСТЬ
    if (code === "54") {
        hubs.unshift({ id: "nsk", title: "🔬 Сибирский Наукоград", items: [["Академгородок ID", "app"], ["Золотая Корона", "app"], ["Зоопарк AR", "app"], ["НОВАТ Билеты", "web"], ["Электронный Город", "web"]] });
    } else if (code === "77") {
        hubs.unshift({ id: "msk", title: "🏙️ Московская Экосистема", items: [["Mos.ru Портал", "app"], ["Тройка Bio-Pay", "app"], ["Московский Транспорт", "app"], ["Активный Гражданин", "web"], ["МЭШ Школа", "web"]] });
    } else if (code === "16") {
        hubs.unshift({ id: "tat", title: "🌙 Татарстан Digital", items: [["Услуги РТ", "app"], ["Иннополис ID", "app"], ["Карта Алга", "app"], ["Народный Контроль", "web"]] });
    } else if (code === "14") {
        hubs.unshift({ id: "yak", title: "💎 Якутский Арктик", items: [["Актировка Alert", "app"], ["Паромы Якутии", "app"], ["InDrive Original", "app"], ["Саха-ID", "web"]] });
    } else if (code === "82" || code === "92") {
        hubs.unshift({ id: "crimea", title: "🌊 Крымская Сеть", items: [["РНКБ Банк", "app"], ["Волна Мобайл", "app"], ["Цифровой Крым", "web"], ["ЕГКС Билет", "web"]] });
    }

    return hubs;
}

const regInput = document.getElementById('regInput');
const regSuggests = document.getElementById('regSuggests');
const homeScreen = document.getElementById('home-screen');
const regionScreen = document.getElementById('region-screen');

regInput.addEventListener('input', (e) => {
    const val = e.target.value.toLowerCase().trim();
    regSuggests.innerHTML = '';
    if (val.length < 1) { regSuggests.style.display = 'none'; return; }
    const filtered = regionsDB.filter(r => r[1].toLowerCase().includes(val) || r[0].includes(val));
    if (filtered.length > 0) {
        regSuggests.style.display = 'block';
        filtered.forEach(r => {
            const div = document.createElement('div');
            div.className = 'suggest-item';
            div.innerHTML = `<span>📍 ${r[1]}</span> <small>${r[0]}</small>`;
            div.onclick = () => { window.location.hash = 'reg' + r[0]; };
            regSuggests.appendChild(div);
        });
    }
});

function renderRegion(code) {
    const reg = regionsDB.find(r => r[0] === code);
    if (!reg) return goHome();

    homeScreen.style.display = 'none';
    regionScreen.style.display = 'block';
    document.getElementById('regTitle').innerText = reg[1];

    const grid = document.getElementById('megaGrid');
    const nav = document.getElementById('catNav');
    grid.innerHTML = ''; nav.innerHTML = '';

    const hubs = getHubs(reg[0], reg[1]);
    
    hubs.forEach(hub => {
        const chip = document.createElement('div');
        chip.className = 'nav-chip';
        chip.innerText = hub.title.split(' ')[1];
        chip.onclick = () => document.getElementById('hub-' + hub.id).scrollIntoView({ behavior: 'smooth', block: 'center' });
        nav.appendChild(chip);

        const card = document.createElement('div');
        card.className = 'card'; card.id = 'hub-' + hub.id;
        
        const top3 = hub.items.slice(0, 3);
        const others = hub.items.slice(3);

        let html = `<h3 class="card-h3">${hub.title}</h3>`;
        top3.forEach(l => {
            html += `<a href="#" class="service-link">${l[0]} <span>${l[1].toUpperCase()}</span></a>`;
        });

        if (others.length > 0) {
            html += `<details>
                <summary>ЕЩЁ ${others.length} СЕРВИСОВ</summary>
                <div style="margin-top:15px;">
                    ${others.map(l => `<a href="#" class="service-link web" style="font-size:0.9rem; opacity:0.8;">${l[0]} <span>${l[1].toUpperCase()}</span></a>`).join('')}
                </div>
            </details>`;
        }
        card.innerHTML = html;
        grid.appendChild(card);
    });
}

function goHome() { window.location.hash = ''; homeScreen.style.display = 'flex'; regionScreen.style.display = 'none'; regInput.value = ''; }
function router() { const h = window.location.hash; if (h.startsWith('#reg')) renderRegion(h.replace('#reg', '')); else goHome(); }

window.onhashchange = router;
window.onload = router;
document.addEventListener('click', (e) => { if (!e.target.closest('#regInput')) regSuggests.style.display = 'none'; });
</script>
</body>
</html>
