function getRegionalGovLink(code, name) {

// Функция детерминированного перемешивания (на основе кода региона)
function deterministicShuffle(array, seed) {
    const arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.abs(Math.sin(seed + i)) * 1000000) % (i + 1);
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function getRegionalHubs(code, name) {

        { id: "games", title: "🎮 Игры", items: gamesItems },

// ---------- ОТОБРАЖЕНИЕ РЕГИОНА ----------
let currentRegionCode = null;
let currentHubs = [];

function renderRegion(code) {
    const reg = regionsDB.find(r => r[0] === code);
    if (!reg) return goHome();
    currentRegionCode = code;
    document.getElementById('home-screen').style.display = 'none';
    document.getElementById('region-screen').style.display = 'block';
    document.getElementById('regTitle').innerText = reg[1];
    
    currentHubs = getRegionalHubs(reg[0], reg[1]);
    const grid = document.getElementById('megaGrid');
    const tocDiv = document.getElementById('tocContainer');
    grid.innerHTML = '';
    tocDiv.innerHTML = '';
    
    // Оглавление
    currentHubs.forEach(hub => {
        const link = document.createElement('a');
        link.href = `#hub-${hub.id}`;
        link.innerText = hub.title.split('(')[0].trim();
        link.onclick = (e) => {
            e.preventDefault();
            document.getElementById(`hub-${hub.id}`).scrollIntoView({ behavior: 'smooth', block: 'start' });
        };
        tocDiv.appendChild(link);
    });
    
    // Карточки
    currentHubs.forEach(hub => {
        const card = document.createElement('div');
        card.className = 'card';
        card.id = `hub-${hub.id}`;
        const top3 = hub.items.slice(0, 3);
        const others = hub.items.slice(3);
        let html = `<h3 class="card-h3">${hub.title}</h3>`;
        top3.forEach(l => { html += `<a href="${l[1]}" target="_blank" class="service-link">${l[0]} <span>➔</span></a>`; });
        if (others.length) {
            html += `<details><summary>ДРУГИЕ (${others.length})</summary><div style="margin-top:5px;">${others.map(l => `<a href="${l[1]}" target="_blank" class="service-link" style="font-size:0.85rem;">${l[0]} <span>➔</span></a>`).join('')}</div></details>`;
        }
        card.innerHTML = html;
        grid.appendChild(card);
    });
    
    // Сбросить поиск
    document.getElementById('serviceSearchInput').value = '';
    showAllCards();
}

function showAllCards() {
    const cards = document.querySelectorAll('#megaGrid .card');
    cards.forEach(card => card.classList.remove('hidden'));
}

function filterServices(query) {
    if (!query.trim()) { showAllCards(); return; }
    const q = query.toLowerCase();
    const cards = document.querySelectorAll('#megaGrid .card');
    cards.forEach(card => {
        const links = card.querySelectorAll('.service-link');
        let found = false;
        links.forEach(link => {
            const text = link.innerText.toLowerCase();
            if (text.includes(q)) {
                link.style.display = 'flex';
                found = true;
            } else {
                link.style.display = 'none';
            }
        });
        // Также показывать карточку, если хоть одна ссылка подходит
        if (found) card.classList.remove('hidden');
        else card.classList.add('hidden');
    });
}

// ---------- ПОИСК РЕГИОНА НА ГЛАВНОЙ ----------
const regInput = document.getElementById('regInput');
const regSuggests = document.getElementById('regSuggests');
const homeScreen = document.getElementById('home-screen');
const regionScreen = document.getElementById('region-screen');

regInput.addEventListener('input', (e) => {
    const val = e.target.value.toLowerCase().trim();
    regSuggests.innerHTML = '';
    if (val.length < 1) { regSuggests.style.display = 'none'; return; }
    const filtered = regionsDB.filter(r => r[1].toLowerCase().includes(val) || r[0].includes(val));
    if (filtered.length) {
        regSuggests.style.display = 'block';
        filtered.forEach(r => {
            const div = document.createElement('div');
            div.className = 'suggest-item';
            div.innerHTML = `<span>📍 ${r[1]}</span> <small>${r[0]}</small>`;
            div.onclick = () => { window.location.hash = 'reg' + r[0]; };
            regSuggests.appendChild(div);
        });
    } else regSuggests.style.display = 'none';
});

function goHome() { window.location.hash = ''; homeScreen.style.display = 'flex'; regionScreen.style.display = 'none'; regInput.value = ''; regSuggests.style.display = 'none'; }
function router() { const h = window.location.hash; if (h.startsWith('#reg')) renderRegion(h.replace('#reg', '')); else goHome(); }
window.onhashchange = router;
window.onload = router;
document.addEventListener('click', (e) => { if (!e.target.closest('#regInput') && !e.target.closest('#regSuggests')) regSuggests.style.display = 'none'; });
document.getElementById('searchBtn').addEventListener('click', () => { filterServices(document.getElementById('serviceSearchInput').value); });
document.getElementById('serviceSearchInput').addEventListener('keyup', (e) => { if (e.key === 'Enter') filterServices(e.target.value); });
</script>
