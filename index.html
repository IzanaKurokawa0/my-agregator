<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>А | ГосНавигатор 2026 — Глобальное Обновление</title>
    <style>
        :root {
            --bg: #f2f4f7; --card-bg: #ffffff; --text: #0f172a;
            --accent: #ef4444; --border: #e2e8f0; --muted: #64748b;
        }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #020617; --card-bg: #0f172a; --text: #ffffff; --border: #1e293b; }
        }
        * { margin:0; padding:0; box-sizing:border-box; transition: 0.2s ease; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }

        /* HEADER - МОНОЛИТ */
        header { 
            background: var(--bg); padding: 12px 15px; border-bottom: 3px solid var(--accent);
            position: sticky; top: 0; z-index: 10000; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .nav-inner { max-width: 1800px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo-box { background: var(--accent); color: #fff; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: 900; font-size: 20px; }

        /* ЭКРАНЫ */
        #home-screen { padding: 80px 15px; text-align: center; max-width: 800px; margin: 0 auto; min-height: 80vh; display: flex; flex-direction: column; justify-content: center; }
        .hero-h1 { font-size: 3rem; font-weight: 950; letter-spacing: -2px; margin-bottom: 30px; line-height: 1; color: var(--text); }
        .main-input { width: 100%; padding: 25px 35px; border-radius: 20px; border: 3px solid var(--border); font-size: 1.4rem; outline: none; background: var(--card-bg); color: var(--text); font-weight: 800; box-shadow: 0 25px 50px rgba(0,0,0,0.15); }

        #region-screen { display: none; padding: 20px; max-width: 1850px; margin: 0 auto; }

        /* КАТЕГОРИИ */
        .cat-nav { 
            background: var(--bg); padding: 15px 0; position: sticky; top: 60px; z-index: 9999;
            display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border);
        }
        .nav-chip { padding: 10px 18px; border-radius: 12px; background: var(--card-bg); border: 1.5px solid var(--border); font-weight: 800; cursor: pointer; white-space: nowrap; }
        .nav-chip:hover { border-color: var(--accent); color: var(--accent); }

        /* ГРИД И КАРТОЧКИ */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--card-bg); border-radius: 25px; padding: 20px; border: 1.5px solid var(--border); display: flex; flex-direction: column; }
        .card-h3 { font-size: 1.2rem; font-weight: 950; margin-bottom: 15px; color: var(--accent); display: flex; align-items: center; gap: 8px; text-transform: uppercase; }
        
        .service-link { 
            display: flex; justify-content: space-between; align-items: center; 
            text-decoration: none; color: var(--text); padding: 12px; border-radius: 12px;
            margin-bottom: 8px; font-weight: 700; font-size: 1rem; background: rgba(0,0,0,0.03);
        }
        .service-link:hover { background: var(--accent); color: white; }
        .service-link span { font-size: 0.7rem; padding: 3px 7px; border-radius: 6px; background: rgba(0,0,0,0.1); font-weight: 900; }

        /* СПОЙЛЕР */
        details { margin-top: 5px; }
        summary { cursor: pointer; font-weight: 900; color: var(--muted); list-style: none; font-size: 0.8rem; text-transform: uppercase; padding: 12px; text-align: center; background: var(--bg); border-radius: 12px; }

        .suggest-list { position: absolute; top: 110px; left: 0; right: 0; background: var(--card-bg); border-radius: 25px; box-shadow: 0 30px 60px rgba(0,0,0,0.2); z-index: 11000; display: none; overflow: hidden; }
        .suggest-item { padding: 20px 30px; cursor: pointer; display: flex; justify-content: space-between; font-weight: 900; font-size: 1.2rem; border-bottom: 1px solid var(--border); }
        .suggest-item:hover { background: var(--accent); color: white; }

        footer { padding: 60px; text-align: center; font-weight: 900; opacity: 0.5; }
    </style>
</head>
<body>

<header>
    <div class="nav-inner">
        <div class="logo" onclick="goHome()" style="display:flex; align-items:center; gap:10px; cursor:pointer;">
            <div class="logo-box">А</div>
            <div style="font-weight: 950; font-size: 1.2rem;">ГОСНАВИГАТОР 2026</div>
        </div>
        <div style="background:#000; color:#fff; padding:5px 12px; border-radius:8px; font-weight:900; font-size:0.8rem;">COMBO PRO</div>
    </div>
</header>

<main id="home-screen">
    <h1 class="hero-h1">Цифровая матрица <br>твоего региона.</h1>
    <div style="position: relative; width: 100%;">
        <input type="text" id="regInput" class="main-input" placeholder="Поиск (54, Якутия, Москва)..." autocomplete="off">
        <div id="regSuggests" class="suggest-list"></div>
    </div>
</main>

<main id="region-screen">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
        <h2 id="regTitle" style="font-size: 2.5rem; font-weight: 950;">Регион</h2>
        <button onclick="goHome()" style="padding: 12px 25px; border-radius: 15px; border: none; font-weight: 900; background: var(--text); color: #fff; cursor: pointer;">СМЕНИТЬ</button>
    </div>
    <nav class="cat-nav" id="catNav"></nav>
    <div id="megaGrid" class="grid"></div>
</main>

<script>
const regionsDB = [
    ["01", "Адыгея"], ["02", "Башкортостан"], ["03", "Бурятия"], ["04", "Алтай"], ["05", "Дагестан"], ["06", "Ингушетия"],
    ["07", "Кабардино-Балкария"], ["08", "Калмыкия"], ["09", "Карачаево-Черкесия"], ["10", "Карелия"], ["11", "Коми"],
    ["12", "Марий Эл"], ["13", "Мордовия"], ["14", "Якутия"], ["15", "Северная Осетия"], ["16", "Татарстан"],
    ["17", "Тыва"], ["18", "Удмуртия"], ["19", "Хакасия"], ["21", "Чувашия"], ["22", "Алтайский край"],
    ["23", "Краснодарский край"], ["24", "Красноярский край"], ["25", "Приморский край"], ["26", "Ставропольский край"],
    ["27", "Хабаровский край"], ["28", "Амурская область"], ["29", "Архангельская область"], ["30", "Астраханская область"],
    ["31", "Белгородская область"], ["32", "Брянская область"], ["33", "Владимирская область"], ["34", "Волгоградская область"],
    ["35", "Вологодская область"], ["36", "Воронежская область"], ["37", "Ивановская область"], ["38", "Иркутская область"],
    ["39", "Калининградская область"], ["40", "Калужская область"], ["41", "Камчатский край"], ["42", "Кемеровская область"],
    ["43", "Кировская область"], ["44", "Костромская область"], ["45", "Курганская область"]
];

function getHubs(code, name) {
    const baseFin = [["СберOS (Bio)", "app"], ["Т-Банк 3.0", "app"], ["Альфа-Мир", "app"], ["Цифровой Рубль", "web"], ["ВТБ Онлайн", "web"]];
    const baseShop = [["Ozon Сфера", "app"], ["WB Global", "app"], ["Яндекс Маркет", "app"], ["МегаМаркет", "web"], ["Avito Бартер", "web"]];
    const baseMove = [["Яндекс Go (AI)", "app"], ["Fater (Uber 2.0)", "app"], ["2ГИС Спутник", "app"], ["Whoosh", "web"], ["Ситидрайв", "web"]];
    const baseLife = [["MAX Messenger", "app"], ["ГосНейро РФ", "app"], ["RuStore 2026", "app"], ["Яндекс Музыка", "web"], ["ВК Видео", "web"], ["Самокат (7 мин)", "app"]];

    let hubs = [
        { id: "fin", title: "💰 Финансы 2026", items: baseFin },
        { id: "shop", title: "🛍️ Маркеты", items: baseShop },
        { id: "move", title: "🚕 Транспорт", items: baseMove },
        { id: "life", title: "📱 Жизнь и App", items: baseLife }
    ];

    // ИНДИВИДУАЛЬНОСТЬ (1-45)
    if (code === "14") hubs.unshift({ id: "yak", title: "💎 Якутия-Digital", items: [["Актировка Alert", "app"], ["Паромы Лены", "app"], ["InDrive Original", "app"], ["Саха-ID", "web"], ["Алмазный Край", "web"]] });
    if (code === "16") hubs.unshift({ id: "tat", title: "🌙 Татарстан Hub", items: [["Услуги РТ (App)", "app"], ["Иннополис ID", "app"], ["Карта Алга", "app"], ["Народный Контроль", "web"], ["Татнефть Pay", "web"]] });
    if (code === "23") hubs.unshift({ id: "krd", title: "☀️ Южный Хаб", items: [["Курортный Сбор", "web"], ["Вина Кубани (Gid)", "app"], ["АгроМаркет", "web"], ["Мой Сочи", "app"]] });
    if (code === "39") hubs.unshift({ id: "kgd", title: "🏰 Янтарный Край", items: [["Граница-Online", "app"], ["Паромы в РФ", "web"], ["Янтарный ID", "web"]] });
    
    return hubs;
}
const regionsDB2 = [
    ["46", "Курская обл."], ["47", "Ленинградская обл."], ["48", "Липецкая обл."], ["49", "Магаданская обл."], ["50", "Московская обл."], 
    ["51", "Мурманская обл."], ["52", "Нижегородская обл."], ["53", "Новгородская обл."], ["54", "Новосибирская обл."], ["55", "Омская обл."], 
    ["56", "Оренбургская обл."], ["57", "Орловская обл."], ["58", "Пензенская обл."], ["59", "Пермский край"], ["60", "Псковская обл."], 
    ["61", "Ростовская обл."], ["62", "Рязанская обл."], ["63", "Самарская обл."], ["64", "Саратовская обл."], ["65", "Сахалинская обл."], 
    ["66", "Свердловская обл."], ["67", "Смоленская обл."], ["68", "Тамбовская обл."], ["69", "Тверская обл."], ["70", "Томская обл."], 
    ["71", "Тульская обл."], ["72", "Тюменская обл."], ["73", "Ульяновская обл."], ["74", "Челябинская обл."], ["75", "Забайкальский край"], 
    ["76", "Ярославская обл."], ["77", "г. Москва"], ["78", "г. Санкт-Петербург"], ["79", "Еврейская АО"], ["82", "Республика Крым"], 
    ["83", "Ненецкий АО"], ["86", "ХМАО — Югра"], ["87", "Чукотский АО"], ["89", "Ямало-Ненецкий АО"], ["92", "г. Севастополь"]
];
regionsDB.push(...regionsDB2);

// ДОРЕБОТКА ХАБОВ ДЛЯ 46-92
const oldGetHubs = getHubs;
getHubs = function(code, name) {
    let hubs = oldGetHubs(code, name);
    if (code === "54") {
        hubs.unshift({ id: "nsk", title: "🔬 Новосибирский Хаб", items: [["Академгородок ID", "app"], ["Золотая Корона (Bio)", "app"], ["Зоопарк AR", "app"], ["НОВАТ Билеты", "web"], ["Система Город", "web"], ["Электронный Город", "app"]] });
    }
    if (code === "77") {
        hubs.unshift({ id: "msk", title: "🏙️ Москва Экосистема", items: [["Mos.ru (Портал)", "app"], ["Тройка Bio-Pay", "app"], ["Парковки Москвы", "app"], ["МЭШ Школа", "web"], ["Активный Гражданин", "web"], ["Велобайк 2026", "app"]] });
    }
    if (code === "78") {
        hubs.unshift({ id: "spb", title: "⚓ Питер-ID", items: [["ЕКП (Карта)", "app"], ["Подорожник Online", "app"], ["Эрмитаж AI", "app"], ["Фонтанка News", "web"], ["Горэлектротранс", "web"]] });
    }
    if (code === "66") {
        hubs.unshift({ id: "ekb", title: "⚒️ Уральский Стек", items: [["ЕСК Уралочка", "app"], ["E1.RU Город", "app"], ["Промобот Help", "web"]] });
    }
    if (code === "89") {
        hubs.unshift({ id: "yam", title: "❄️ Морошка Ямала", items: [["Карта Морошка", "app"], ["Авиа-Ямал", "web"], ["Помощь Тундры", "web"]] });
    }
    return hubs;
};

// ЛОГИКА РЕНДЕРА
const regInput = document.getElementById('regInput');
const regSuggests = document.getElementById('regSuggests');

regInput.addEventListener('input', (e) => {
    const val = e.target.value.toLowerCase().trim();
    regSuggests.innerHTML = '';
    if (val.length < 1) { regSuggests.style.display = 'none'; return; }
    const filtered = regionsDB.filter(r => r[1].toLowerCase().includes(val) || r[0].includes(val));
    if (filtered.length > 0) {
        regSuggests.style.display = 'block';
        filtered.forEach(r => {
            const div = document.createElement('div');
            div.className = 'suggest-item';
            div.innerHTML = `<span>📍 ${r[1]}</span> <small>${r[0]}</small>`;
            div.onclick = () => { window.location.hash = 'reg' + r[0]; };
            regSuggests.appendChild(div);
        });
    }
});

function renderRegion(code) {
    const reg = regionsDB.find(r => r[0] === code);
    if (!reg) return goHome();
    document.getElementById('home-screen').style.display = 'none';
    const rs = document.getElementById('region-screen');
    rs.style.display = 'block';
    document.getElementById('regTitle').innerText = reg[1];
    
    const grid = document.getElementById('megaGrid');
    const nav = document.getElementById('catNav');
    grid.innerHTML = ''; nav.innerHTML = '';

    const hubs = getHubs(reg[0], reg[1]);
    hubs.forEach(hub => {
        const chip = document.createElement('div');
        chip.className = 'nav-chip';
        chip.innerText = hub.title.split(' ')[1] || hub.title;
        chip.onclick = () => document.getElementById('hub-' + hub.id).scrollIntoView({ behavior: 'smooth', block: 'center' });
        nav.appendChild(chip);

        const card = document.createElement('div');
        card.className = 'card'; card.id = 'hub-' + hub.id;
        
        const top3 = hub.items.slice(0, 3);
        const others = hub.items.slice(3);

        let html = `<h3 class="card-h3">${hub.title}</h3>`;
        top3.forEach(l => { html += `<a href="#" class="service-link">${l[0]} <span>${l[1].toUpperCase()}</span></a>`; });
        if (others.length > 0) {
            html += `<details><summary>ЕЩЁ ${others.length} СЕРВИСОВ</summary><div style="margin-top:10px;">${others.map(l => `<a href="#" class="service-link" style="opacity:0.8; font-size:0.85rem;">${l[0]} <span>${l[1].toUpperCase()}</span></a>`).join('')}</div></details>`;
        }
        card.innerHTML = html;
        grid.appendChild(card);
    });
}

function goHome() { window.location.hash = ''; document.getElementById('home-screen').style.display = 'flex'; document.getElementById('region-screen').style.display = 'none'; regInput.value = ''; }
function router() { const h = window.location.hash; if (h.startsWith('#reg')) renderRegion(h.replace('#reg', '')); else goHome(); }

window.onhashchange = router;
window.onload = router;
document.addEventListener('click', (e) => { if (!e.target.closest('#regInput')) regSuggests.style.display = 'none'; });
</script>
</body>
</html>
