<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>А | ГосНавигатор 2026 — Ультимативный агрегатор</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%2294%22 height=%2294%22 x=%223%22 y=%223%22 rx=%2222%22 fill=%22white%22 stroke=%22%23ef4444%22 stroke-width=%226%22/><text y=%2275%22 x=%2222%22 font-size=%2275%22 font-family=%22Arial, sans-serif%22 font-weight=%22900%22 fill=%22%23ef4444%22>А</text></svg>">

    <style>
        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --accent: #ef4444;
            --border: #e2e8f0;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #020617;
                --card-bg: #0f172a;
                --text: #ffffff; 
                --border: #1e293b;
                --shadow: 0 20px 60px rgba(0,0,0,0.5);
            }
            .card-h3 { color: #ffffff !important; }
        }

        * { margin:0; padding:0; box-sizing:border-box; transition: 0.25s ease; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; font-size: 14px; }

        header { 
            background: var(--card-bg); padding: 12px 20px; border-bottom: 3px solid var(--accent);
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-inner { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo-box { 
            background: #fff; border: 2.5px solid var(--accent); color: var(--accent); 
            width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; 
            border-radius: 10px; font-weight: 900; font-size: 22px; 
        }

        /* ГИГАНТСКИЙ ПОИСК РЕГИОНА */
        #home-screen { padding: 80px 20px; text-align: center; max-width: 900px; margin: 0 auto; min-height: 80vh; display: flex; flex-direction: column; justify-content: center; }
        .hero-h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 950; letter-spacing: -3px; margin-bottom: 40px; }
        .main-input { 
            width: 100%; padding: 35px 45px; border-radius: 60px; border: 4px solid var(--border);
            font-size: 1.6rem; outline: none; background: var(--card-bg); color: var(--text); font-weight: 800;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
        }
        .main-input:focus { border-color: var(--accent); transform: translateY(-5px); }

        /* ЭКРАН РЕГИОНА */
        #region-screen { display: none; padding: 15px 20px 80px; max-width: 1600px; margin: 0 auto; }
        
        /* КАТЕГОРИИ (2-3 РЯДА) */
        .cat-nav { 
            background: var(--bg); padding: 15px 0; border-bottom: 2px solid var(--border); 
            position: sticky; top: 65px; z-index: 950; 
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
        }
        .nav-chip { 
            padding: 8px 16px; border-radius: 12px; background: var(--card-bg); 
            border: 1.5px solid var(--border); font-weight: 800; font-size: 0.8rem; cursor: pointer;
        }
        .nav-chip:hover { border-color: var(--accent); color: var(--accent); }

        /* КОМПАКТНЫЕ КАРТОЧКИ */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 25px; }
        .card { 
            background: var(--card-bg); border-radius: 28px; padding: 22px; 
            border: 2px solid var(--border); box-shadow: var(--shadow);
            scroll-margin-top: 180px;
        }
        .card-h3 { font-size: 1.3rem; font-weight: 900; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        
        .service-link { 
            display: flex; justify-content: space-between; align-items: center; 
            text-decoration: none; color: var(--text); padding: 10px 0; 
            border-bottom: 1px solid var(--border); font-weight: 700; font-size: 1rem;
        }
        .service-link:hover { color: var(--accent); padding-left: 6px; }

        /* КНОПКА "ЕЩЁ" */
        details { margin-top: 10px; }
        summary { cursor: pointer; font-weight: 900; color: var(--accent); font-size: 0.75rem; text-transform: uppercase; list-style: none; }
        summary:hover { text-decoration: underline; }

        footer { padding: 60px 20px; text-align: center; border-top: 1px solid var(--border); color: #64748b; font-weight: 800; }

        .suggest-list { 
            position: absolute; top: 110px; left: 0; right: 0; background: var(--card-bg); 
            border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); z-index: 100; display: none; padding: 15px;
        }
        .suggest-item { padding: 15px 25px; border-radius: 15px; cursor: pointer; display: flex; justify-content: space-between; font-weight: 800; font-size: 1.2rem; }
        .suggest-item:hover { background: var(--accent); color: white; }

        @media (max-width: 768px) {
            .hero-h1 { font-size: 2.2rem; }
            .grid { grid-template-columns: 1fr; }
            .cat-nav { justify-content: flex-start; overflow-x: auto; flex-wrap: nowrap; }
        }
    </style>
</head>
<body>

<header>
    <div class="nav-inner">
        <div class="logo" onclick="goHome()" style="display:flex; align-items:center; gap:10px; cursor:pointer;">
            <div class="logo-box">А</div>
            <div style="font-size: 1.4rem; font-weight: 950; letter-spacing: -1px;">ГосНавигатор</div>
        </div>
        <div id="status-badge" style="background:var(--accent); color:#fff; padding:6px 12px; border-radius:8px; font-weight:900; font-size:0.7rem;">2026 PRO</div>
    </div>
</header>

<main id="home-screen">
    <h1 class="hero-h1">Цифровая жизнь <br>вашего региона.</h1>
    <div style="position: relative; width: 100%; max-width: 800px; margin: 0 auto;">
        <input type="text" id="regInput" class="main-input" placeholder="Введите регион (напр. Новосибирск)..." autocomplete="off">
        <div id="regSuggests" class="suggest-list"></div>
    </div>
</main>

<main id="region-screen">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h2 id="regTitle" style="font-size: 2.2rem; font-weight: 950; letter-spacing: -2px;">Регион</h2>
        <button onclick="goHome()" style="padding: 10px 20px; border-radius: 12px; border: 2px solid var(--border); font-weight: 900; background: var(--card-bg); color: var(--text); cursor: pointer;">СМЕНИТЬ</button>
    </div>
    <nav class="cat-nav" id="catNav"></nav>
    <div id="megaGrid" class="grid"></div>
</main>

<footer>
    <p>© 2026 GOS-NAVIGATOR-PROJECT.RU — КИРИЛЛ ЧЕРНЯКОВ</p>
</footer>

    ["58", "Пензенская обл."], ["59", "Пермский край"], ["60", "Псковская обл."], ["61", "Ростовская обл."],
    ["62", "Рязанская обл."], ["63", "Самарская обл."], ["64", "Саратовская обл."], ["65", "Сахалинская обл."],
    ["66", "Свердловская обл."], ["67", "Смоленская обл."], ["68", "Тамбовская обл."], ["69", "Тверская обл."],
    ["70", "Томская обл."], ["71", "Тульская обл."], ["72", "Тюменская обл."], ["73", "Ульяновская обл."],
    ["74", "Челябинская обл."], ["75", "Забайкальский край"], ["76", "Ярославская обл."], ["77", "г. Москва"],
    ["78", "г. Санкт-Петербург"], ["79", "Еврейская АО"], ["82", "Республика Крым"], ["83", "Ненецкий АО"],
    ["86", "ХМАО — Югра"], ["87", "Чукотский АО"], ["89", "Ямало-Ненецкий АО"], ["92", "г. Севастополь"]
];

// ГИПЕР-ГЕНЕРАТОР ХАБОВ 2026

    const enc = encodeURIComponent(name);
    return [
        { id: "gov", title: "🏛️ Власть", top: [

            ["Налоговая (ФНС)", "https://lkfl2.nalog.ru"]
        ], other: [
            ["Судебные приставы", "https://fssp.gov.ru"],
            ["Администрация", `https://yandex.ru/search/?text=администрация+${enc}`],
            ["ГИБДД (Штрафы)", "https://www.gosuslugi.ru/600101/1/form"],

        ]},
        { id: "comm", title: "💬 Связь", top: [

        ], other: [

        { id: "fin", title: "💰 Банки", top: [

            ["ВТБ Онлайн", "https://www.vtb.ru"]
        ], other: [
            ["Альфа-Банк", "https://alfabank.ru"],
            ["Газпромбанк", "https://www.gazprombank.ru"],
            ["Райффайзен", "https://www.raiffeisen.ru"],
            ["ПСБ", "https://www.psbank.ru"],
            ["МТС Банк", "https://www.mtsbank.ru"],
            ["Совкомбанк", "https://sovcombank.ru"],
            ["Цифровой Рубль", "https://www.cbr.ru/fintech/dr/"],
            ["Сравни.ру", "https://www.sravni.ru"],
            ["Банки.ру", "https://www.banki.ru"]
        ]},
        { id: "shop", title: "🛍️ Покупки", top: [
            ["Wildberries", "https://www.wildberries.ru"],

        ], other: [

            ["AliExpress", "https://aliexpress.ru"],

        { id: "food", title: "🍔 Еда и Такси", top: [

            ["Магнит", "https://magnit.ru"]
        ]},
        { id: "tour", title: "✈️ Туризм", top: [
            ["Aviasales", "https://www.aviasales.ru"],
            ["РЖД Пассажирам", "https://www.rzd.ru"],
            ["Яндекс Путешествия", "https://travel.yandex.ru"]
        ], other: [

            ["Суточно.ру", "https://sutochno.ru"],
            ["Tutu.ru", "https://www.tutu.ru"],
            ["Tripster", "https://tripster.ru"],
            ["Аэрофлот", "https://www.aeroflot.ru"]
        ]},
        { id: "med", title: "🏥 Здоровье", top: [
            ["Запись к врачу", "https://www.gosuslugi.ru/600447/1/form"],
            ["Поиск лекарств", "https://aptekamos.ru"],
            ["СберЗдоровье", "https://sberhealth.ru"]
        ], other: [
            ["Регистратура", `https://yandex.ru/search/?text=регистратура+${enc}`],
            ["Инвитро", "https://www.invitro.ru"],
            ["Гемотест", "https://gemotest.ru"],

        ]},
        { id: "apps", title: "📲 RuStore", top: [
            ["RuStore (Скачать)", "https://www.rustore.ru"],
            ["AppGallery", "https://appgallery.huawei.com"],
            ["НашСтор", "https://nashstore.ru"]
        ], other: [
            ["Сбербанк APK", "https://www.sberbank.ru/ru/person/dist_services/inner_apps"],
            ["Альфа APK", "https://alfabank.ru/apps/"],

        ]}
    ];
}

// УПРАВЛЕНИЕ
const regInput = document.getElementById('regInput');
const regSuggests = document.getElementById('regSuggests');
const homeScreen = document.getElementById('home-screen');
const regionScreen = document.getElementById('region-screen');

regInput.addEventListener('input', (e) => {
    const val = e.target.value.toLowerCase().trim();
    regSuggests.innerHTML = '';
    if (val.length < 1) { regSuggests.style.display = 'none'; return; }
    const filtered = regionsDB.filter(r => r[1].toLowerCase().includes(val) || r[0].includes(val));
    if (filtered.length > 0) {
        regSuggests.style.display = 'block';
        filtered.forEach(r => {
            const div = document.createElement('div');
            div.className = 'suggest-item';
            div.innerHTML = `<span>📍 ${r[1]}</span> <small>${r[0]}</small>`;
            div.onclick = () => { window.location.hash = 'reg' + r[0]; };
            regSuggests.appendChild(div);
        });
    }
});

function renderRegion(code) {
    const reg = regionsDB.find(r => r[0] === code);
    if (!reg) return goHome();

    homeScreen.style.display = 'none';
    regionScreen.style.display = 'block';
    document.getElementById('regTitle').innerText = reg[1];

    const grid = document.getElementById('megaGrid');
    const nav = document.getElementById('catNav');
    grid.innerHTML = '';
    nav.innerHTML = '';

    const data = getFullHubs(reg[0], reg[1]);
    
    // Метро-детектор
    const metroCodes = ["54", "77", "78", "16", "63", "52", "66"];
    if (metroCodes.includes(code)) {
        data.splice(3, 0, { id: "metro", title: "🚇 Метро", top: [
            ["Схема и время", `https://yandex.ru/search/?text=схема+метро+${encodeURIComponent(reg[1])}`],
            ["Пополнить карту", `https://yandex.ru/search/?text=пополнить+карту+метро+${encodeURIComponent(reg[1])}`]
        ], other: [] });
    }

    data.forEach(hub => {
        // Навигация
        const chip = document.createElement('div');
        chip.className = 'nav-chip';
        chip.innerText = hub.title.split(' ')[1] || hub.title;
        chip.onclick = () => document.getElementById('hub-' + hub.id).scrollIntoView({ behavior: 'smooth' });
        nav.appendChild(chip);

        // Карточка
        const card = document.createElement('div');
        card.className = 'card';
        card.id = 'hub-' + hub.id;
        
        let html = `<h3 class="card-h3">${hub.title}</h3>`;
        hub.top.forEach(l => {
            html += `<a href="${l[1]}" target="_blank" class="service-link">${l[0]} <span>➔</span></a>`;
        });

        if (hub.other.length > 0) {
            html += `
                <details>
                    <summary>ПОКАЗАТЬ ВСЁ (${hub.other.length})</summary>
                    <div style="margin-top:10px;">
                        ${hub.other.map(l => `<a href="${l[1]}" target="_blank" class="service-link">${l[0]} <small>➔</small></a>`).join('')}
                    </div>
                </details>
            `;
        }
        
        card.innerHTML = html;
        grid.appendChild(card);
    });
}

function goHome() {
    window.location.hash = '';
    homeScreen.style.display = 'flex';
    regionScreen.style.display = 'none';
    regInput.value = '';
}

function router() {
    const h = window.location.hash;
    if (h.startsWith('#reg')) {
        renderRegion(h.replace('#reg', ''));
    } else {
        goHome();
    }
}

window.addEventListener('hashchange', router);
window.addEventListener('load', router);
document.addEventListener('click', (e) => {
    if (!e.target.closest('#regInput')) regSuggests.style.display = 'none';
});
</script>
</body>
</html>
