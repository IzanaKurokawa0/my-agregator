<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>А | ГосНавигатор — Агрегатор услуг РФ</title>
    
    <!-- ИКОНКА ВКЛАДКИ (Красная буква А) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23e63946%22/><text y=%22.75em%22 x=%2218%22 font-size=%2280%22 font-family=%22Arial, sans-serif%22 font-weight=%22bold%22 fill=%22white%22>А</text></svg>">

    <style>
        :root {
            --primary: #0052cc;
            --accent-red: #e63946; 
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #172b4d;
            --text-muted: #5e6c84;
            --radius: 16px;
            --shadow: 0 8px 24px rgba(149, 157, 165, 0.1);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text-main); line-height: 1.6; }

        header { background: #fff; padding: 12px 20px; border-bottom: 1px solid #ebecf0; position: sticky; top: 0; z-index: 1000; }
        .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; cursor: pointer; }
        .logo-box { 
            background: var(--accent-red); color: white; width: 36px; height: 36px; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 8px; font-weight: bold; font-size: 22px; font-family: Arial;
        }
        .logo-text { font-size: 1.3rem; font-weight: 800; color: var(--text-main); }

        #home-screen { padding: 80px 20px; max-width: 900px; margin: 0 auto; text-align: center; min-height: 85vh; display: flex; flex-direction: column; justify-content: center; }
        .hero-h1 { font-size: 3rem; font-weight: 800; margin-bottom: 15px; color: #091e42; }
        .hero-p { font-size: 1.2rem; color: var(--text-muted); margin-bottom: 40px; }
        
        .search-container { position: relative; width: 100%; max-width: 600px; margin: 0 auto; }
        .main-input { 
            width: 100%; padding: 22px 30px; border-radius: 50px; border: 2px solid #dfe1e6; 
            font-size: 1.2rem; outline: none; transition: 0.3s; box-shadow: var(--shadow);
        }
        .main-input:focus { border-color: var(--accent-red); }
        
        .results-list { 
            position: absolute; top: 80px; left: 0; right: 0; 
            background: #fff; border-radius: var(--radius); 
            box-shadow: 0 15px 40px rgba(0,0,0,0.12); max-height: 350px; overflow-y: auto; 
            z-index: 100; display: none; border: 1px solid #ebecf0;
        }
        .result-item { padding: 16px 25px; text-align: left; cursor: pointer; border-bottom: 1px solid #f4f5f7; display: flex; justify-content: space-between; }
        .result-item:hover { background: #fff1f2; }

        #region-screen { display: none; padding: 40px 20px; max-width: 1200px; margin: 0 auto; }
        .region-card-header { 
            background: #fff; padding: 40px; border-radius: var(--radius); 
            box-shadow: var(--shadow); margin-bottom: 30px; border-top: 5px solid var(--accent-red);
        }
        
        .emergency-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 20px;}
        .e-btn { padding: 10px 20px; border-radius: 8px; text-decoration: none; font-size: 0.9rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .e-red { background: #ffebe6; color: #bf2600; }
        .e-blue { background: #deebff; color: #0747a6; }

        .services-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; }
        
        .card { background: #fff; border-radius: var(--radius); padding: 25px; box-shadow: var(--shadow); transition: 0.3s; border: 1px solid #f0f0f0; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent-red); }
        .card-h3 { font-size: 1.3rem; margin-bottom: 18px; color: #172b4d; border-bottom: 2px solid #f4f5f7; padding-bottom: 10px; }
        
        .link-item { 
            display: flex; justify-content: space-between; align-items: center; 
            text-decoration: none; color: #42526e; padding: 10px 0; 
            border-bottom: 1px solid #f4f5f7; font-weight: 500;
        }
        .link-item:hover { color: var(--accent-red); }
        .badge { font-size: 0.7rem; background: #f4f5f7; color: #5e6c84; padding: 3px 10px; border-radius: 12px; }

        footer { padding: 60px 20px; text-align: center; color: var(--text-muted); font-size: 0.9rem; border-top: 1px solid #eee; margin-top: 50px;}

        @media (max-width: 768px) {
            .hero-h1 { font-size: 2rem; }
            .services-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="nav-inner">
        <a href="#" onclick="goHome()" class="logo">
            <div class="logo-box">А</div>
            <div class="logo-text">ГосНавигатор</div>
        </a>
        <div id="active-reg-name" style="font-weight: 700; color: var(--accent-red);"></div>
    </div>
</header>

<!-- HOME -->
<main id="home-screen">
    <h1 class="hero-h1">Все услуги вашего региона</h1>
    <p class="hero-p">Выберите субъект РФ для доступа к официальным сервисам</p>
    
    <div class="search-container">
        <input type="text" id="regionInput" class="main-input" placeholder="Название или код региона (напр. 54)" autocomplete="off">
        <div id="resultsList" class="results-list"></div>
    </div>
</main>

<!-- REGION -->
<main id="region-screen">
    <div class="region-card-header">
        <h2 id="display-region-title">Регион</h2>
        <div class="emergency-grid">
            <a href="tel:112" class="e-btn e-red">🆘 Служба 112</a>
            <a href="tel:122" class="e-btn e-blue">📞 Справка 122</a>
            <a href="https://dom.gosuslugi.ru" target="_blank" class="e-btn" style="background:#f4f5f7; color:#333;">🏠 ГИС ЖКХ</a>
        </div>
    </div>

    <div id="services-box" class="services-grid"></div>
    
    <div style="margin-top: 40px; text-align: center;">
        <button onclick="goHome()" style="background:none; border:1px solid #ccc; padding:10px 20px; border-radius:8px; cursor:pointer;">← К выбору региона</button>
    </div>
</main>

<footer>
    <p>© 2024 ГосНавигатор — Кирилл Черняков, 25132БУ</p>
</footer>

<script>
const regionsDB = [
    ["01", "Республика Адыгея"], ["02", "Республика Башкортостан"], ["03", "Республика Бурятия"], ["04", "Республика Алтай"],
    ["05", "Республика Дагестан"], ["06", "Республика Ингушетия"], ["07", "Кабардино-Балкарская Респ."], ["08", "Республика Калмыкия"],
    ["09", "Карачаево-Черкесская Респ."], ["10", "Республика Карелия"], ["11", "Республика Коми"], ["12", "Республика Марий Эл"],
    ["13", "Республика Мордовия"], ["14", "Республика Саха (Якутия)"], ["15", "Республика Северная Осетия"], ["16", "Республика Татарстан"],
    ["17", "Республика Тыва"], ["18", "Удмуртская Республика"], ["19", "Республика Хакасия"], ["21", "Чувашская Республика"],
    ["22", "Алтайский край"], ["23", "Краснодарский край"], ["24", "Красноярский край"], ["25", "Приморский край"],
    ["26", "Ставропольский край"], ["27", "Хабаровский край"], ["28", "Амурская область"], ["29", "Архангельская область"],
    ["30", "Астраханская область"], ["31", "Белгородская область"], ["32", "Брянская область"], ["33", "Владимирская область"],
    ["34", "Волгоградская область"], ["35", "Вологодская область"], ["36", "Воронежская область"], ["37", "Ивановская область"],
    ["38", "Иркутская область"], ["39", "Калининградская область"], ["40", "Калужская область"], ["41", "Камчатский край"],
    ["42", "Кемеровская область"], ["43", "Кировская область"], ["44", "Костромская область"], ["45", "Курганская область"],
    ["46", "Курская область"], ["47", "Ленинградская область"], ["48", "Липецкая область"], ["49", "Магаданская область"],
    ["50", "Московская область"], ["51", "Мурманская область"], ["52", "Нижегородская область"], ["53", "Новгородская область"],
    ["54", "Новосибирская область"], ["55", "Омская область"], ["56", "Оренбургская область"], ["57", "Орловская область"],
    ["58", "Пензенская область"], ["59", "Пермский край"], ["60", "Псковская область"], ["61", "Ростовская область"],
    ["62", "Рязанская область"], ["63", "Самарская область"], ["64", "Саратовская область"], ["65", "Сахалинская область"],
    ["66", "Свердловская область"], ["67", "Смоленская область"], ["68", "Тамбовская область"], ["69", "Тверская область"],
    ["70", "Томская область"], ["71", "Тульская область"], ["72", "Тюменская область"], ["73", "Ульяновская область"],
    ["74", "Челябинская область"], ["75", "Забайкальский край"], ["76", "Ярославская область"], ["77", "г. Москва"],
    ["78", "г. Санкт-Петербург"], ["79", "Еврейская автономная обл."], ["82", "Республика Крым"], ["83", "Ненецкий автономный округ"],
    ["86", "Ханты-Мансийский АО — Югра"], ["87", "Чукотский автономный округ"], ["89", "Ямало-Ненецкий АО"], ["92", "г. Севастополь"]
];

// ГЕНЕРАТОР УСЛУГ ДЛЯ ВЫБРАННОГО РЕГИОНА
function getRegionServices(code, name) {
    return [
        {
            title: "🏛️ Власть и Госуслуги",
            links: [
                ["Портал Госуслуг", `https://${code}.gosuslugi.ru`, "Главное"],
                ["МФЦ «Мои Документы»", "https://mfc.rf", "Визит"],
                ["Налоговая (ЛК)", "https://lkfl2.nalog.ru", "Налоги"],
                ["Администрация", `https://yandex.ru/search/?text=администрация+${encodeURIComponent(name)}`, "Инфо"]
            ]
        },
        {
            title: "🏥 Медицина",
            links: [
                ["Запись к врачу", "https://www.gosuslugi.ru/600447/1/form", "Рецепты"],
                ["Электронная регистратура", `https://yandex.ru/search/?text=запись+к+врачу+${encodeURIComponent(name)}`, "Регион"],
                ["Справка 122", "tel:122", "Звонок"]
            ]
        },
        {
            title: "🚆 Транспорт",
            links: [
                ["Яндекс Карты (Транспорт)", "https://yandex.ru/maps", "Live"],
                ["Билеты на автобусы", "https://www.tutu.ru", "Межгород"],
                ["РЖД Пассажирам", "https://www.rzd.ru", "Поезда"]
            ]
        },
        {
            title: "💡 ЖКХ и Жилье",
            links: [
                ["ГИС ЖКХ", "https://dom.gosuslugi.ru", "Оплата"],
                ["Система «Город»", "https://kvartplata.ru", "Чеки"],
                ["Росреестр", "https://rosreestr.gov.ru", "Выписки"]
            ]
        },
        {
            title: "🎨 Досуг и Культура",
            links: [
                ["Афиша региона", `https://afisha.yandex.ru/search?text=${encodeURIComponent(name)}`, "Куда сходить"],
                ["Пушкинская карта", "https://www.culture.ru/pushkinskaya-karta", "Молодежи"],
                ["Kassir.ru", "https://kassir.ru", "Билеты"]
            ]
        }
    ];
}

// ЛОГИКА ПОИСКА И ПЕРЕКЛЮЧЕНИЯ ЭКРАНОВ
const regionInput = document.getElementById('regionInput');
const resultsList = document.getElementById('resultsList');
const homeScreen = document.getElementById('home-screen');
const regionScreen = document.getElementById('region-screen');

// Функция поиска
regionInput.addEventListener('input', (e) => {
    const val = e.target.value.toLowerCase();
    resultsList.innerHTML = '';
    if (val.length < 1) { resultsList.style.display = 'none'; return; }

    const filtered = regionsDB.filter(r => r[1].toLowerCase().includes(val) || r[0].includes(val));

    if (filtered.length > 0) {
        resultsList.style.display = 'block';
        filtered.forEach(r => {
            const div = document.createElement('div');
            div.className = 'result-item';
            div.innerHTML = `<span>${r[1]}</span> <small>${r[0]} регион</small>`;
            div.onclick = () => { window.location.hash = 'reg' + r[0]; };
            resultsList.appendChild(div);
        });
    } else {
        resultsList.style.display = 'none';
    }
});

// Рендеринг страницы региона
function renderRegionPage(code) {
    const reg = regionsDB.find(r => r[0] === code);
    if (!reg) return goHome();

    homeScreen.style.display = 'none';
    regionScreen.style.display = 'block';
    document.getElementById('display-region-title').innerText = reg[1];
    document.getElementById('active-reg-name').innerText = '📍 ' + reg[1];

    const container = document.getElementById('services-box');
    container.innerHTML = '';

    const services = getRegionServices(reg[0], reg[1]);
    services.forEach(cat => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <h3 class="card-h3">${cat.title}</h3>
            <div class="link-list">
                ${cat.links.map(l => `
                    <a href="${l[1]}" target="_blank" class="link-item">
                        ${l[0]} <span class="badge">${l[2]}</span>
                    </a>
                `).join('')}
            </div>
        `;
        container.appendChild(card);
    });
}

function goHome() {
    window.location.hash = '';
    homeScreen.style.display = 'flex';
    regionScreen.style.display = 'none';
    document.getElementById('active-reg-name').innerText = '';
    regionInput.value = '';
    resultsList.style.display = 'none';
}

// Роутинг (обработка изменения URL)
function handleRoute() {
    const hash = window.location.hash;
    if (hash.startsWith('#reg')) {
        renderRegionPage(hash.replace('#reg', ''));
    } else {
        goHome();
    }
}

window.addEventListener('hashchange', handleRoute);
window.addEventListener('load', handleRoute);

// Скрытие результатов при клике вне поиска
document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-container')) resultsList.style.display = 'none';
});
</script>
</body>
</html>
