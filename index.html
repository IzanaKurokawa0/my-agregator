const regInput = document.getElementById('regInput');
const regSuggests = document.getElementById('regSuggests');
const homeScreen = document.getElementById('home-screen');
const regionScreen = document.getElementById('region-screen');

regInput.addEventListener('input', (e) => {
    const val = e.target.value.toLowerCase().trim();
    regSuggests.innerHTML = '';
    if (val.length < 1) { regSuggests.style.display = 'none'; return; }
    const filtered = regionsDB.filter(r => r[1].toLowerCase().includes(val) || r[0].includes(val));
    if (filtered.length > 0) {
        regSuggests.style.display = 'block';
        filtered.forEach(r => {
            const div = document.createElement('div');
            div.className = 'suggest-item';
            div.innerHTML = `<span>📍 ${r[1]}</span> <small>${r[0]}</small>`;
            div.onclick = () => { window.location.hash = 'reg' + r[0]; };
            regSuggests.appendChild(div);
        });
    }
});

function renderRegion(code) {
    const reg = regionsDB.find(r => r[0] === code);
    if (!reg) return goHome();
    homeScreen.style.display = 'none';
    regionScreen.style.display = 'block';
    document.getElementById('regTitle').innerText = reg[1];
    const grid = document.getElementById('megaGrid');
    const nav = document.getElementById('catNav');
    grid.innerHTML = ''; nav.innerHTML = '';

    const hubs = getRegionalHubs(reg[0], reg[1]);
    hubs.forEach(hub => {
        const chip = document.createElement('div');
        chip.className = 'nav-chip';
        // Упрощенный текст чипса: убираем всё в скобках, если есть.
        chip.innerText = hub.title.split('(')[0].trim(); 
        chip.onclick = () => document.getElementById('hub-' + hub.id).scrollIntoView({ behavior: 'smooth', block: 'center' });
        nav.appendChild(chip);

        const card = document.createElement('div');
        card.className = 'card'; card.id = 'hub-' + hub.id;
        
        const top3 = hub.items.slice(0, 3);
        const others = hub.items.slice(3);

        let html = `<h3 class="card-h3">${hub.title}</h3>`;
        top3.forEach(l => { html += `<a href="${l[1]}" target="_blank" class="service-link">${l[0]} <span>➔</span></a>`; });
        if (others.length > 0) {
            html += `<details><summary>ДРУГИЕ (${others.length})</summary><div style="margin-top:5px;">${others.map(l => `<a href="${l[1]}" target="_blank" class="service-link" style="font-size:0.85rem; opacity:0.8;">${l[0]} <span>➔</span></a>`).join('')}</div></details>`;
        }
        card.innerHTML = html;
        grid.appendChild(card);
    });
}

function goHome() { 
    window.location.hash = ''; 
    homeScreen.style.display = 'flex'; 
    regionScreen.style.display = 'none'; 
    regInput.value = ''; 
    regSuggests.style.display = 'none'; // Скрываем подсказки при возврате на главный экран
}
function router() { 
    const h = window.location.hash; 
    if (h.startsWith('#reg')) {
        renderRegion(h.replace('#reg', '')); 
        // Добавлен небольшой таймаут для прокрутки, чтобы дать время на рендеринг
        setTimeout(() => {
            if (window.scrollY < 100) { // Если пользователь вверху страницы, прокручиваем к началу контента
                document.getElementById('region-screen').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }, 100);
    } else {
        goHome();
    }
}
window.onhashchange = router;
window.onload = router;
document.addEventListener('click', (e) => { 
    if (!e.target.closest('#regInput') && !e.target.closest('#regSuggests')) { 
        regSuggests.style.display = 'none'; 
    }
});
</script>
