<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>А | ГосНавигатор — Твое окно активности</title>
    
    <!-- FAVICON: Красная А на белом фоне -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22white%22/><text y=%22.85em%22 x=%2210%22 font-size=%2285%22 font-family=%22Arial, sans-serif%22 font-weight=%22900%22 fill=%22%23e63946%22>А</text></svg>">

    <style>
        :root {
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --header-bg: rgba(255, 255, 255, 0.95);
            --text: #0f172a;
            --muted: #475569;
            --accent: #e63946;
            --border: #e2e8f0;
            --shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            scroll-behavior: smooth;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #020617;
                --card-bg: #0f172a;
                --header-bg: rgba(2, 6, 23, 0.95);
                --text: #ffffff; /* Максимально яркий текст для читаемости */
                --muted: #94a3b8;
                --border: #1e293b;
                --shadow: 0 20px 50px rgba(0,0,0,0.3);
            }
        }

        * { margin:0; padding:0; box-sizing:border-box; transition: 0.3s ease; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* HEADER */
        header { 
            background: var(--header-bg); backdrop-filter: blur(20px); 
            padding: 15px 24px; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--accent);
        }
        .nav-inner { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
        .logo-box { 
            background: #fff; border: 3px solid var(--accent); color: var(--accent); 
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; 
            border-radius: 12px; font-weight: 900; font-size: 26px; 
        }

        /* QUICK NAV (Чипсы для быстрого перехода) */
        .category-nav {
            display: none; background: var(--header-bg); padding: 10px 0; border-bottom: 1px solid var(--border);
            overflow-x: auto; white-space: nowrap; scrollbar-width: none;
        }
        .category-nav::-webkit-scrollbar { display: none; }
        .nav-chip {
            display: inline-block; padding: 8px 18px; margin: 0 5px; border-radius: 20px;
            background: var(--card-bg); border: 1px solid var(--border);
            text-decoration: none; color: var(--text); font-weight: 800; font-size: 0.85rem;
        }
        .nav-chip:hover { border-color: var(--accent); background: var(--accent); color: white; }

        /* HERO & INTENT SEARCH */
        #home-screen { padding: 100px 20px; text-align: center; max-width: 900px; margin: 0 auto; min-height: 80vh; display: flex; flex-direction: column; justify-content: center; }
        .hero-h1 { font-size: clamp(2.5rem, 8vw, 4.2rem); font-weight: 900; letter-spacing: -3px; line-height: 1; margin-bottom: 30px; }
        
        .ai-search-box { position: relative; width: 100%; max-width: 700px; margin: 0 auto; }
        .ai-input { 
            width: 100%; padding: 26px 40px; border-radius: 40px; 
            border: 3px solid var(--border); font-size: 1.3rem; outline: none; 
            background: var(--card-bg); color: var(--text); box-shadow: var(--shadow);
            font-weight: 700;
        }
        .ai-input:focus { border-color: var(--accent); transform: translateY(-3px); }

        /* DASHBOARD */
        #region-screen { display: none; padding: 40px 24px; max-width: 1500px; margin: 0 auto; }
        .dash-header { 
            background: var(--card-bg); padding: 40px; border-radius: 40px; 
            box-shadow: var(--shadow); margin-bottom: 30px; border-left: 10px solid var(--accent);
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;
        }
        .dash-header h2 { font-size: 2.5rem; font-weight: 900; letter-spacing: -2px; }

        /* DIGITAL VAULT (СЕЙФ) */
        .vault { 
            background: var(--c-fam); padding: 25px; border-radius: 30px; 
            border: 2px dashed var(--accent); margin-bottom: 30px;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px;
        }
        .vault-input { 
            padding: 15px; border-radius: 15px; border: 1px solid var(--border);
            background: var(--bg); color: var(--text); font-weight: 800;
        }

        /* GRID */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 30px; }
        
        .card { 
            background: var(--card-bg); border-radius: 35px; padding: 30px; 
            border: 1px solid var(--border); box-shadow: var(--shadow);
            scroll-margin-top: 150px; /* Чтобы при переходе заголовок не скрывался под шапкой */
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card-h3 { font-size: 1.5rem; font-weight: 900; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }

        .service-link { 
            display: flex; justify-content: space-between; align-items: center; 
            text-decoration: none; color: var(--text); padding: 14px 0; 
            border-bottom: 1.5px solid var(--border); font-weight: 700; font-size: 1.05rem;
        }
        .service-link:hover { color: var(--accent); padding-left: 10px; }

        footer { padding: 80px 24px; text-align: center; color: var(--muted); font-weight: 800; border-top: 2px solid var(--border); }

        /* Поиск регионов */
        .reg-suggests { 
            position: absolute; top: 90px; left: 0; right: 0; background: var(--card-bg); 
            border-radius: 25px; box-shadow: var(--shadow); z-index: 100; display: none; padding: 15px;
        }
        .reg-item { padding: 15px 25px; border-radius: 15px; cursor: pointer; display: flex; justify-content: space-between; font-weight: 800; }
        .reg-item:hover { background: var(--accent); color: white; }

        @media (max-width: 768px) {
            .hero-h1 { font-size: 2rem; }
            .grid { grid-template-columns: 1fr; }
            .dash-header { padding: 25px; }
        }
    </style>
</head>

    </div>

</main>

// ЛОГИКА УПРАВЛЕНИЯ
const aiInput = document.getElementById('aiInput');
const regSuggests = document.getElementById('regSuggests');
const homeScreen = document.getElementById('home-screen');
const regionScreen = document.getElementById('region-screen');
const categoryNav = document.getElementById('categoryNav');

// Интеллектуальный поиск (Регионы + Намерения)
aiInput.addEventListener('input', (e) => {
    const query = e.target.value.toLowerCase().trim();
    regSuggests.innerHTML = '';
    
    if (query.length < 1) { regSuggests.style.display = 'none'; return; }

    // Проверка на "Намерение" (врач, еда и т.д.)
    let foundIntent = false;
    for (let key in intents) {
        if (query.includes(key)) {
            const div = document.createElement('div');
            div.className = 'reg-item';
            div.innerHTML = `<span>🚀 Перейти к: <b>${intents[key]}</b></span>`;
            div.onclick = () => {
                const saved = localStorage.getItem('lastReg');
                if (saved) {
                    window.location.hash = 'reg' + saved;
                    setTimeout(() => scrollToBlock(intents[key]), 500);
                } else {
                    alert("Сначала выберите ваш регион!");
                }
            };
            regSuggests.appendChild(div);
            foundIntent = true;
        }
    }

    // Поиск регионов
    const filtered = regionsDB.filter(r => r[1].toLowerCase().includes(query) || r[0].includes(query));
    if (filtered.length > 0) {
        filtered.forEach(r => {
            const div = document.createElement('div');
            div.className = 'reg-item';
            div.innerHTML = `<span>📍 ${r[1]}</span> <small>${r[0]}</small>`;
            div.onclick = () => { window.location.hash = 'reg' + r[0]; };
            regSuggests.appendChild(div);
        });
    }

    if (filtered.length > 0 || foundIntent) regSuggests.style.display = 'block';
});

function scrollToBlock(id) {
    const cards = document.querySelectorAll('.card-h3');
    cards.forEach(card => {
        if (card.innerText.includes(id)) {
            card.parentElement.scrollIntoView({ behavior: 'smooth' });
            card.parentElement.style.borderColor = 'var(--accent)';
            setTimeout(() => card.parentElement.style.borderColor = 'var(--border)', 2000);
        }
    });
}

function renderDashboard(code) {
    const reg = regionsDB.find(r => r[0] === code);
    if (!reg) return goHome();

    localStorage.setItem('lastReg', code);
    homeScreen.style.display = 'none';
    regionScreen.style.display = 'block';
    categoryNav.style.display = 'block';
    
    document.getElementById('regTitle').innerText = reg[1];
    document.getElementById('regInfo').innerText = code + ' РЕГИОН РФ';
    document.getElementById('status-tag').innerText = reg[1].toUpperCase();

    const grid = document.getElementById('mainMegaGrid');
    grid.innerHTML = '';
    categoryNav.innerHTML = '';

    const data = getFullData(reg[0], reg[1]);
    data.forEach((cat, index) => {
        // Создаем карточку
        const card = document.createElement('div');
        card.className = 'card';
        card.id = 'cat-' + index;
        card.innerHTML = `
            <h3 class="card-h3">${cat.title}</h3>
            <div style="flex-grow:1">
                ${cat.links.map(l => `<a href="${l[1]}" target="_blank" class="service-link">${l[0]} <small style="opacity:0.5">➔</small></a>`).join('')}
            </div>
        `;
        grid.appendChild(card);

        // Создаем "чипс" навигации
        const chip = document.createElement('a');
        chip.className = 'nav-chip';
        chip.href = '#';
        chip.innerText = cat.title;
        chip.onclick = (e) => {
            e.preventDefault();
            card.scrollIntoView({ behavior: 'smooth' });
        };
        categoryNav.appendChild(chip);
    });
    loadV();
}

function goHome() {
    window.location.hash = '';
    homeScreen.style.display = 'flex';
    regionScreen.style.display = 'none';
    categoryNav.style.display = 'none';
    aiInput.value = '';
    regSuggests.style.display = 'none';
    document.getElementById('status-tag').innerText = 'ВЫБЕРИТЕ РЕГИОН';
}

function saveV() {
    localStorage.setItem('v_jkh', document.getElementById('v_jkh').value);
    localStorage.setItem('v_omc', document.getElementById('v_omc').value);
    localStorage.setItem('v_snils', document.getElementById('v_snils').value);
}

function loadV() {
    document.getElementById('v_jkh').value = localStorage.getItem('v_jkh') || '';
    document.getElementById('v_omc').value = localStorage.getItem('v_omc') || '';
    document.getElementById('v_snils').value = localStorage.getItem('v_snils') || '';
}

function router() {
    const h = window.location.hash;
    if (h.startsWith('#reg')) {
        renderDashboard(h.replace('#reg', ''));
    } else {
        goHome();
    }
}

window.addEventListener('hashchange', router);
window.addEventListener('load', router);
document.addEventListener('click', (e) => {
    if (!e.target.closest('.ai-search-box')) regSuggests.style.display = 'none';
});
</script>
</body>
</html>
